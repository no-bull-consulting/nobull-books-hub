<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="manifest" href="manifest.json">
    
    <title>no~bull books | Client Portal</title>
    
    <style>
        :root {
            --navy: #14213D;
            --teal: #14A8AE;
            --slate: #94a3b8;
            --bg: #0f172a;
            --card-bg: #1e293b;
        }

        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; display: none; }
        
        #portal-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white; text-align: center; padding: 20px; box-sizing: border-box; }
        .dashboard-box { background: var(--card-bg); padding: 32px; border-radius: 16px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); width: 100%; max-width: 440px; border: 1px solid #334155; }
        
        .logo-text { font-family: Georgia, serif; font-size: 24px; margin-bottom: 24px; font-weight: bold; }
        .logo-text span { color: var(--teal); }
        
        h3 { margin: 0 0 8px 0; font-size: 18px; }
        .subtitle { font-size: 13px; color: var(--slate); margin-bottom: 24px; line-height: 1.5; }

        #instance-list { display: flex; flex-direction: column; gap: 12px; max-height: 300px; overflow-y: auto; margin-bottom: 20px; }
        
        .company-card { 
            background: var(--bg); 
            padding: 16px; 
            border-radius: 10px; 
            border: 1px solid #334155; 
            cursor: pointer; 
            text-align: left; 
            transition: transform 0.2s, border-color 0.2s;
            border-left: 4px solid var(--teal);
        }
        .company-card:hover { transform: translateY(-2px); border-color: var(--teal); }
        .company-card .name { font-weight: 600; color: white; font-size: 15px; margin-bottom: 2px; }
        .company-card .meta { font-size: 11px; color: var(--slate); text-transform: uppercase; letter-spacing: 0.05em; }

        button.btn-action { 
            width: 100%; padding: 14px; background: var(--teal); color: white; border: none; 
            border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px; transition: opacity 0.2s; 
        }
        button.btn-action:hover { opacity: 0.9; }
        button.btn-action:disabled { opacity: 0.5; cursor: not-allowed; }

        .spinner { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--teal); border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .footer-links { margin-top: 25px; padding-top: 20px; border-top: 1px solid #334155; display: flex; justify-content: space-between; font-size: 11px; }
        .footer-links a { color: var(--slate); text-decoration: none; }
        .footer-links a:hover { color: var(--teal); }
        
        .error-message { background: #7f1d1d; color: #fecaca; padding: 12px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
    </style>
</head>
<body>

<div id="portal-container">
    <div class="dashboard-box">
        <div class="logo-text">no~bull <span>books</span></div>
        
        <div id="auth-stage" style="text-align: center; padding: 40px;">
            <h3>Welcome</h3>
            <p style="color: #64748b; font-size: 14px; margin-bottom: 20px;">
                Sign in to access your business workspaces.
            </p>
            
            <div id="g_id_onload"
                 data-client_id="490062327176-b9q29mjh1dtd4cave1ct4c03ri90dkvc.apps.googleusercontent.com"
                 data-context="signin"
                 data-ux_mode="popup"
                 data-callback="handleSignIn"
                 data-auto_prompt="false">
            </div>

            <div class="g_id_signin"
                 data-type="standard"
                 data-shape="rectangular"
                 data-theme="filled_black"
                 data-text="signin_with"
                 data-size="large"
                 data-logo_alignment="left">
            </div>
        </div>

        <div id="dashboard-stage" style="display: none; padding: 20px;">
            <div id="loading-indicator" style="text-align: center; padding: 20px;">
                <div class="spinner"></div> 
                <p style="font-size: 13px; color: #64748b; margin-top: 10px;">Fetching your workspaces...</p>
            </div>
            
            <div id="instance-list"></div>
            <div id="error-message" style="display: none;"></div>

            <div style="margin-top: 30px; border-top: 1px solid #334155; padding-top: 20px; text-align: center;">
                <button onclick="signOut()" style="background: none; border: none; color: #ef4444; cursor: pointer; font-size: 12px;">
                    Sign Out
                </button>
            </div>
        </div>
        
    </div>
</div>

<iframe id="appFrame"></iframe>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
    const ADMIN_API_URL = "https://script.google.com/macros/s/AKfycbzn0lviNLO7I-ket-X-wDIuGILA0pekIb9yppn9UWQ7NVUWyutLl4jnhIAC0W03c-Hs/exec";

    // Holds the Google-issued ID token (JWT) for the current session.
    // The backend re-verifies this on every call; we just relay it.
    let _credential = null;
    let _userEmail  = null;
    
    document.addEventListener('DOMContentLoaded', function() {
        if (!document.getElementById('portal-container')) {
            console.error("Portal container missing!");
        }
    });

    function handleSignIn(response) {
        if (!response || !response.credential) {
            console.error("Sign-in returned no credential");
            return;
        }
        _credential = response.credential;
        try {
            // Decode payload for UX only — server still re-verifies the signature.
            const claims = JSON.parse(atob(_credential.split('.')[1]));
            _userEmail = claims.email || null;
        } catch (e) {
            console.warn("Could not decode JWT payload:", e);
        }

        const authStage = document.getElementById('auth-stage');
        const dashStage = document.getElementById('dashboard-stage');
        if (!authStage || !dashStage) {
            console.error("Required DOM elements not found");
            return;
        }
        authStage.style.display = 'none';
        dashStage.style.display = 'block';
        setTimeout(fetchInstances, 100);
    }

    function showError(message) {
        const errorDiv = document.getElementById('error-message');
        const listContainer = document.getElementById('instance-list');
        const loader = document.getElementById('loading-indicator');
        
        if (loader) loader.style.display = 'none';
        if (listContainer) listContainer.innerHTML = '';
        if (errorDiv) {
            errorDiv.innerHTML = '<div class="error-message">⚠️ ' + escapeHtml(message) + '</div>';
            errorDiv.style.display = 'block';
        }
    }

    function fetchInstances() {
        const listContainer = document.getElementById('instance-list');
        const loader = document.getElementById('loading-indicator');
        const errorDiv = document.getElementById('error-message');
        
        if (!listContainer) return;
        if (!_credential) {
            showError("Not signed in. Please sign in again.");
            return;
        }
        
        if (loader) loader.style.display = 'block';
        if (errorDiv) errorDiv.style.display = 'none';
        listContainer.innerHTML = '';
        
        const callbackName = 'jsonp_cb_' + Math.round(Math.random() * 1e9);
        const timeoutId = setTimeout(function() {
            if (window[callbackName]) {
                delete window[callbackName];
                if (loader) loader.style.display = 'none';
                showError("Request timed out. Please check your connection and try again.");
            }
        }, 15000);

        window[callbackName] = function(data) {
            clearTimeout(timeoutId);
            if (loader) loader.style.display = 'none';
            
            try {
                if (!data || !data.success) {
                    var msg = (data && data.error) ? data.error : 'Unknown error from server.';
                    // If the JWT was rejected, force re-sign-in.
                    if (/JWT_/.test(msg)) {
                        showError("Your session has expired. Please sign out and sign in again.");
                    } else {
                        showError(msg);
                    }
                    return;
                }
                renderInstances(data.instances || [], data.email || _userEmail);
            } catch(e) {
                console.error("Error processing instances:", e);
                showError("Error loading workspaces: " + e.message);
            } finally {
                delete window[callbackName];
            }
        };

        try {
            const script = document.createElement('script');
            const params = new URLSearchParams({
                action:     'getInstances',
                callback:   callbackName,
                credential: _credential
            });
            script.src = ADMIN_API_URL + '?' + params.toString();
            script.onerror = function() {
                clearTimeout(timeoutId);
                if (loader) loader.style.display = 'none';
                delete window[callbackName];
                showError("Failed to connect to the server. Please try again later.");
            };
            document.body.appendChild(script);
        } catch(e) {
            clearTimeout(timeoutId);
            if (loader) loader.style.display = 'none';
            showError("Failed to load workspaces: " + e.message);
        }
    }

    function renderInstances(instances, email) {
        const listContainer = document.getElementById('instance-list');
        if (!listContainer) return;

        if (instances.length === 0) {
            // True empty state — show the "start trial" CTA.
            listContainer.innerHTML =
                '<div style="text-align:center;padding:30px;background:#0f172a;border-radius:8px;">' +
                '<h3 style="font-size:18px;color:white;">Welcome to no~bull books</h3>' +
                '<p style="font-size:14px;color:#94a3b8;margin-top:10px;margin-bottom:25px;">' +
                'No workspaces found for ' + escapeHtml(email || 'your account') + '. Ready to start a 14-day free trial?' +
                '</p>' +
                '<button class="btn-action" onclick="createNewWorkspace()">+ Start My Trial</button>' +
                '</div>';
            return;
        }

        // Existing workspaces — render cards. Append a "+ Add another" CTA at the bottom.
        var cards = instances.map(function(inst) {
            var name   = escapeHtml(inst.companyName || 'Unnamed Workspace');
            var status = escapeHtml(inst.status || 'Active');
            var hasUrl = !!inst.appUrl;
            var attr   = hasUrl ? ' onclick="launchApp(\'' + encodeURIComponent(inst.appUrl) + '\')"' : ' style="opacity:0.5;cursor:not-allowed;" title="No URL configured for this workspace"';
            return '<div class="company-card"' + attr + '>' +
                   '<div class="name">' + name + '</div>' +
                   '<div class="meta">' + status + '</div>' +
                   '</div>';
        }).join('');

        cards += '<div class="company-card" style="border-left-color:#94a3b8;text-align:center;" onclick="createNewWorkspace()">' +
                 '<div class="name">+ Add another workspace</div>' +
                 '<div class="meta">Start a new 14-day trial</div>' +
                 '</div>';

        listContainer.innerHTML = cards;
    }

    function escapeHtml(str) {
        if (str === null || str === undefined) return '';
        return String(str).replace(/&/g, '&amp;')
                  .replace(/</g, '&lt;')
                  .replace(/>/g, '&gt;')
                  .replace(/"/g, '&quot;')
                  .replace(/'/g, '&#39;');
    }

    function launchApp(encodedUrl) {
        if (!encodedUrl) {
            alert("Error: No URL for this workspace. Contact support.");
            return;
        }
        var url = decodeURIComponent(encodedUrl);
        if (!/^https?:\/\//.test(url)) {
            alert("Invalid workspace URL.");
            return;
        }
        window.open(url, '_blank', 'noopener');
    }

    function createNewWorkspace() {
        if (!_credential) {
            alert("Please sign in first.");
            return;
        }
        var btns = document.querySelectorAll('.btn-action');
        for (var i = 0; i < btns.length; i++) {
            btns[i].disabled = true;
            btns[i].textContent = 'Redirecting...';
        }
        var params = new URLSearchParams({ action: 'onboard', credential: _credential });
        window.location.href = ADMIN_API_URL + '?' + params.toString();
    }

    function signOut() {
        if (window.google && google.accounts && google.accounts.id) {
            google.accounts.id.disableAutoSelect();
            if (_userEmail) {
                try { google.accounts.id.revoke(_userEmail, function(){}); } catch(_) {}
            }
        }
        _credential = null;
        _userEmail  = null;
        sessionStorage.clear();
        try { localStorage.removeItem('g_state'); } catch(_) {}
        location.reload();
    }
</script>
</body>
</html>
