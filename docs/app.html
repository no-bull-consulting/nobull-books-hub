<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>no~bull books | Client Portal</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #0f172a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; display: none; }
        
        #login-box { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white; text-align: center; padding: 20px; }
        .input-group { background: #1e293b; padding: 40px; border-radius: 16px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); width: 100%; max-width: 420px; border: 1px solid #334155; }
        .logo-text { font-family: Georgia, serif; font-size: 24px; margin-bottom: 20px; }
        .logo-text span { color: #3b82f6; }
        
        input { width: 100%; padding: 14px; margin: 15px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; font-size: 14px; box-sizing: border-box; }
        input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.2); }
        
        button { width: 100%; padding: 14px; background: #2563eb; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 15px; transition: background 0.2s; }
        button:hover { background: #1d4ed8; }
        
        .footer-link { margin-top: 20px; font-size: 12px; color: #94a3b8; text-decoration: none; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-box">
        <div class="input-group">
            <div class="logo-text">no~bull <span>books</span></div>
            <h3 style="margin-bottom: 8px;">Login to your instance</h3>
            <p style="font-size: 13px; color: #94a3b8; margin-bottom: 20px;">Enter your unique Spreadsheet ID</p>
            
            <input type="text" id="sheetIdInput" placeholder="Paste Spreadsheet ID here..." onkeydown="if(event.key==='Enter')launchApp()">
            <button onclick="launchApp()">Open My Books &rarr;</button>
            
            <div style="margin-top: 25px; padding-top: 20px; border-top: 1px solid #334155;">
                <p style="font-size: 11px; color: #64748b;">Don't have an instance yet?</p>
                <a href="https://nobull.consulting" class="footer-link" style="color: #3b82f6;">Visit our homepage</a>
            </div>
        </div>
    </div>

    <iframe id="appFrame"></iframe>

    <script>
        const frame = document.getElementById('appFrame');
        const login = document.getElementById('login-box');
        const baseAppUrl = "https://script.google.com/a/macros/nobull.consulting/s/AKfycbxAr1fwnaEmr5Q3tD8_hOrj8zsQ8TtcAofQipYASdEDR4tKJG8liN-OEMIL1nnrka5j/exec";

        window.onload = function() {
            // 1. Priority: Check URL for ?id=... (Direct bookmark/link)
            const urlParams = new URLSearchParams(window.location.search);
            const urlId = urlParams.get('id');

            if (urlId) {
                // Save it for next time and load
                localStorage.setItem('nb_last_sheet_id', urlId);
                loadFrame(urlId);
                return;
            }

            // 2. Secondary: Check LocalStorage (Persistence)
            const savedId = localStorage.getItem('nb_last_sheet_id');
            if (savedId) {
                loadFrame(savedId);
            }
        };

        function launchApp() {
            const id = document.getElementById('sheetIdInput').value.trim();
            if (id) {
                localStorage.setItem('nb_last_sheet_id', id);
                loadFrame(id);
            } else {
                alert("Please enter a valid Spreadsheet ID");
            }
        }

        function loadFrame(id) {
            login.style.display = 'none';
            frame.style.display = 'block';
            // Passing the ID to GAS via the iframe URL
            frame.src = baseAppUrl + "?id=" + id;
        }

        // Handle "Sign Out" or "Switch Instance" (Optional helper)
        function clearSession() {
            localStorage.removeItem('nb_last_sheet_id');
            window.location.reload();
        }
    </script>
</body>
</html>
