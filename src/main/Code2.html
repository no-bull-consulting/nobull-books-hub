<script>
var _CURR_SYMBOLS={'GBP':'£','EUR':'€','USD':'$','CHF':'Fr','JPY':'¥','CAD':'C$','AUD':'A$'};
function _fmtCurr(n,cc){var s=_CURR_SYMBOLS[cc]||(cc+' ');return s+(Math.abs(n)||0).toFixed(2);}

function include(filename) {
  return HtmlService.createHtmlOutputFromFile(filename).getContent();
}

function renderSA103(d) {
  var catKeys = Object.keys(d.expenseCategories || {});
  var html =
    '<div class="stats-grid" style="grid-template-columns:repeat(5,1fr);margin-bottom:20px">' +
      _saCard('Gross Income',       fmt(d.grossIncome),     'var(--green-600)') +
      _saCard('Total Expenses',     fmt(d.totalExpenses),   'var(--red-500)') +
      _saCard('Capital Allowances', fmt(d.capitalAllowances),'var(--blue-600)') +
      _saCard('Taxable Profit',     fmt(d.taxableProfit),   'var(--g900)') +
      _saCard('Tax & NI Estimate',  fmt(d.totalTax),        d.effectiveRate>40?'var(--red-500)':'var(--amber-500)') +
    '</div>' +
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px">' +
    '<div>' +
      '<div class="card" style="margin-bottom:14px"><div class="card-hdr"><span class="card-ttl">Income & Expenses</span></div>' +
      '<table class="dt"><tbody>' +
        '<tr><td>Gross Income (incl. VAT)</td><td style="text-align:right;font-weight:600">'+fmt(d.grossIncome)+'</td></tr>' +
        catKeys.map(function(k){var cat=d.expenseCategories[k];return cat.total>0?'<tr><td style="padding-left:20px;color:var(--g600)">'+cat.label+' ('+cat.box+')</td><td style="text-align:right">'+fmt(cat.total)+'</td></tr>':''}).join('') +
        '<tr style="border-top:2px solid var(--g200);font-weight:700"><td>Net Profit</td><td style="text-align:right">'+fmt(d.netProfitBeforeAllowances)+'</td></tr>' +
        '<tr><td style="color:var(--g600)">Capital Allowances</td><td style="text-align:right">-'+fmt(d.capitalAllowances)+'</td></tr>' +
        (d.ownUseAdjustment?'<tr><td style="color:var(--g600)">Own-use adjustment</td><td style="text-align:right">'+fmt(d.ownUseAdjustment)+'</td></tr>':'') +
        (d.otherAdjustments?'<tr><td style="color:var(--g600)">Other adjustments</td><td style="text-align:right">'+fmt(d.otherAdjustments)+'</td></tr>':'') +
        '<tr style="border-top:2px solid var(--g900);font-weight:700"><td>Taxable Profit</td><td style="text-align:right">'+fmt(d.taxableProfit)+'</td></tr>' +
      '</tbody></table></div>' +
      '<div class="card"><div class="card-hdr"><span class="card-ttl">Adjustments</span></div><div class="card-body">' +
        '<div class="form-grid-2">' +
          '<div class="form-group"><label class="form-label">Own-use (£)</label><input type="number" class="form-input" id="sa-ownuse" value="'+(d.ownUseAdjustment||0)+'" step="0.01"></div>' +
          '<div class="form-group"><label class="form-label">Other adj (£)</label><input type="number" class="form-input" id="sa-other" value="'+(d.otherAdjustments||0)+'" step="0.01"></div>' +
        '</div>' +
        '<button class="btn btn-secondary btn-sm" onclick="saveAdjustments()">Save & Recalculate</button>' +
      '</div></div>' +
    '</div>' +
    '<div>' +
      '<div class="card" style="margin-bottom:14px"><div class="card-hdr"><span class="card-ttl">Tax & NI Estimate ('+d.taxYear+')</span></div>' +
      '<table class="dt"><tbody>' +
        '<tr><td>Taxable Profit</td><td style="text-align:right;font-weight:600">'+fmt(d.taxableProfit)+'</td></tr>' +
        '<tr><td style="color:var(--g600)">Personal Allowance</td><td style="text-align:right">-'+fmt(d.personalAllowance)+'</td></tr>' +
        '<tr style="border-top:1px solid var(--g200)"><td>Taxable Income</td><td style="text-align:right;font-weight:600">'+fmt(d.taxableIncome)+'</td></tr>' +
        (d.basicRateTax>0?'<tr><td style="color:var(--g600)">Basic rate (20%)</td><td style="text-align:right">'+fmt(d.basicRateTax)+'</td></tr>':'') +
        (d.higherRateTax>0?'<tr><td style="color:var(--amber-500)">Higher rate (40%)</td><td style="text-align:right">'+fmt(d.higherRateTax)+'</td></tr>':'') +
        (d.additionalRateTax>0?'<tr><td style="color:var(--red-500)">Additional rate (45%)</td><td style="text-align:right">'+fmt(d.additionalRateTax)+'</td></tr>':'') +
        '<tr style="border-top:1px solid var(--g200)"><td>Income Tax</td><td style="text-align:right;font-weight:600">'+fmt(d.incomeTax)+'</td></tr>' +
        (d.class2NI>0?'<tr><td style="color:var(--g600)">Class 2 NI</td><td style="text-align:right">'+fmt(d.class2NI)+'</td></tr>':'') +
        (d.class4NI>0?'<tr><td style="color:var(--g600)">Class 4 NI</td><td style="text-align:right">'+fmt(d.class4NI)+'</td></tr>':'') +
        '<tr style="border-top:2px solid var(--g900);font-weight:700"><td>Total Tax & NI</td><td style="text-align:right">'+fmt(d.totalTax)+'</td></tr>' +
        '<tr><td style="font-size:11px;color:var(--g500)">Effective Rate</td><td style="text-align:right;font-size:11px;color:var(--g500)">'+d.effectiveRate+'%</td></tr>' +
      '</tbody></table>' +
      '<div style="padding:9px 14px;background:var(--amber-50);border-top:1px solid #fde68a;font-size:11px;color:#92400e">Estimate only. Verify with your accountant before filing.</div>' +
      '</div>' +
      '<div class="card"><div class="card-hdr"><span class="card-ttl">Capital Allowances</span><button class="btn btn-primary btn-xs" onclick="openAddAssetModal()">+ Add Asset</button></div>' +
      (_sa103State.assets.length
        ? '<table class="dt"><thead><tr><th>Asset</th><th>Cost</th><th>Type</th><th>Private%</th><th>Allowance</th><th></th></tr></thead><tbody>' +
          _sa103State.assets.map(function(a){
            var al = a.assetType==='AIA' ? a.cost*(1-a.privateUsePercent/100) : a.cost*0.18*(1-a.privateUsePercent/100);
            return '<tr><td><strong>'+a.description+'</strong><div style="font-size:10px;color:var(--g400)">'+fmtDate(a.purchaseDate)+'</div></td><td>'+fmt(a.cost)+'</td><td><span class="badge badge-blue" style="font-size:10px">'+a.assetType+'</span></td><td>'+(a.privateUsePercent||0)+'%</td><td class="mono">'+fmt(al)+'</td><td><button class="btn btn-ghost btn-xs" style="color:var(--red-400)" onclick="_delAsset(this)">x</button></td></tr>';
          }).join('')+'</tbody></table>'
        : '<div class="tbl-empty"><p>No capital assets</p><span>Add assets to claim allowances</span></div>') +
      '</div>' +
    '</div></div>';
  var el = document.getElementById('sa-content');
  if (el) el.innerHTML = html;
  // Store assetIds on delete buttons
  document.querySelectorAll('#sa-content [onclick="_delAsset(this)"]').forEach(function(btn, i) {
    var assetId = (_sa103State.assets[i]||{}).assetId;
    btn.setAttribute('data-assetid', assetId||'');
  });
}

async function saveAdjustments() {
  var ownUse = parseFloat((document.getElementById('sa-ownuse')||{}).value)||0;
  var other  = parseFloat((document.getElementById('sa-other') ||{}).value)||0;
  var r = await api('saveSATaxAdjustments', { taxYear:_sa103State.taxYear, ownUse:ownUse, otherAdj:other });
  if (r && r.success) { toast('Saved', 'success'); loadSA103(); }
  else toast('Error: '+(r?r.message||r.error:'unknown'), 'error');
}

async function _delAsset(btn) {
  var assetId = btn.getAttribute('data-assetid');
  if (!assetId) return;
  var r = await api('deleteCapitalAllowance', { assetId:assetId });
  if (r && r.success) { toast('Asset removed', 'success'); loadSA103(); }
  else toast('Error: '+(r?r.message||r.error:'unknown'), 'error');
}

function closeAssetModal() { closeModal('sa-asset'); }

function openAddAssetModal() {
  var yr = _sa103State.taxYear || '';
  openModal('sa-asset', 'Add Capital Asset',
    '<div class="form-grid-2">' +
      '<div class="form-group" style="grid-column:1/-1"><label class="form-label">Description *</label><input type="text" class="form-input" id="ca-desc" placeholder="e.g. MacBook Pro"></div>' +
      '<div class="form-group"><label class="form-label">Purchase Date *</label><input type="date" class="form-input" id="ca-date"></div>' +
      '<div class="form-group"><label class="form-label">Cost (£) *</label><input type="number" class="form-input" id="ca-cost" min="0" step="0.01" placeholder="0.00"></div>' +
      '<div class="form-group"><label class="form-label">Asset Type</label><select class="form-select" id="ca-type"><option value="AIA">AIA (100%)</option><option value="Main Pool">Main Pool (18%)</option><option value="Special Pool">Special Rate (6%)</option></select></div>' +
      '<div class="form-group"><label class="form-label">Private Use %</label><input type="number" class="form-input" id="ca-priv" min="0" max="100" value="0"></div>' +
      '<div class="form-group"><label class="form-label">Tax Year</label><input type="text" class="form-input" id="ca-year" value="'+yr+'" placeholder="2025-26"></div>' +
    '</div>' +
    '<div class="form-group"><label class="form-label">Notes</label><input type="text" class="form-input" id="ca-notes" placeholder="Optional"></div>',
    '<button class="btn btn-secondary" onclick="closeAssetModal()">Cancel</button>' +
    '<button class="btn btn-primary" id="ca-save" onclick="saveAsset()">Add Asset</button>',
    'modal-md'
  );
}

async function saveAsset() {
  var data = {
    description:       (document.getElementById('ca-desc')||{}).value||'',
    purchaseDate:      (document.getElementById('ca-date')||{}).value||'',
    cost:              parseFloat((document.getElementById('ca-cost')||{}).value)||0,
    assetType:         (document.getElementById('ca-type')||{}).value||'AIA',
    privateUsePercent: parseFloat((document.getElementById('ca-priv')||{}).value)||0,
    taxYear:           (document.getElementById('ca-year')||{}).value||'',
    notes:             (document.getElementById('ca-notes')||{}).value||''
  };
  if (!data.description) { toast('Enter a description', 'warning'); return; }
  if (!data.cost||data.cost<=0) { toast('Enter the cost', 'warning'); return; }
  if (!data.taxYear) { toast('Enter tax year e.g. 2025-26', 'warning'); return; }
  var btn = document.getElementById('ca-save');
  if (btn) { btn.disabled=true; btn.textContent='Saving...'; }
  var r = await api('saveCapitalAllowance', data);
  if (r && r.success) { closeModal('sa-asset'); toast('Asset added', 'success'); loadSA103(); }
  else {
    if (btn) { btn.disabled=false; btn.textContent='Add Asset'; }
    toast('Error: '+(r?r.message||r.error:'unknown'), 'error');
  }
}


function _defaultEmailBody() {
  return 'Dear {{clientName}},\n\nPlease find attached invoice <strong>{{invoiceNumber}}</strong> for <strong>{{total}}</strong>, due on <strong>{{dueDate}}</strong>.\n\n' +
    '<strong>Payment Details</strong>\n{{paymentDetails}}\n\n' +
    'If you have any questions, please do not hesitate to get in touch.\n\n' +
    'Kind regards,\n{{companyName}}';
}
function resetEmailTemplate() {
  var s = document.getElementById('s_emailSubject');
  var b = document.getElementById('s_emailBody');
  if (s) s.value = 'Invoice {{invoiceNumber}} from {{companyName}}';
  if (b) b.value = _defaultEmailBody();
  toast('Email template reset to default','info');
}
function closeEmailPreview() { closeEmailPreview(); }
function previewEmailTemplate() {
  var subj = (document.getElementById('s_emailSubject')||{}).value||'';
  var body = (document.getElementById('s_emailBody')||{}).value||'';
  var vars = {
    invoiceNumber:'INV-0042', clientName:'Acme Ltd', total:'£1,200.00',
    dueDate:'31 March 2026', companyName:(App.settings||{}).companyName||'Your Company',
    paymentDetails:'Bank: '+(App.settings||{}).bankName+' · Sort: '+(App.settings||{}).sortCode+' · Acc: '+(App.settings||{}).accountNumber
  };
  var render = function(str){ return str.replace(/\{\{(\w+)\}\}/g, function(_,k){ return vars[k]||('{{'+k+'}}'); }); };
  openModal('email-preview','Email Preview',
    '<div style="margin-bottom:10px"><strong>Subject:</strong> '+render(subj)+'</div>'+
    '<div style="border:1px solid var(--g200);border-radius:var(--r8);padding:16px;background:var(--g50);font-size:13px;white-space:pre-wrap;line-height:1.7">'+render(body)+'</div>',
    '<button class="btn btn-secondary" onclick="closeEmailPreview()">Close</button>',
    'modal-md'
  );
}
// ── CLIENT STATEMENT MODAL ────────────────────────────────────────────────────
function openClientStatementModal(clientId, clientName) {
  var today = new Date().toISOString().split('T')[0];
  var fyStart = (App.settings&&App.settings.financialYearStart) || today.slice(0,4)+'-04-01';
  openModal('cl-statement','Client Statement',
    '<div class="form-group"><label class="form-label">Client</label>' +
      '<div style="font-weight:600;font-size:14px">'+(clientName||clientId)+'</div></div>' +
    '<div class="form-grid-2">' +
      '<div class="form-group"><label class="form-label">From</label>' +
        '<input type="date" class="form-input" id="stmt-from" value="'+fyStart+'"></div>' +
      '<div class="form-group"><label class="form-label">To</label>' +
        '<input type="date" class="form-input" id="stmt-to" value="'+today+'"></div>' +
    '</div>' +
    '<div class="alert alert-info"><p>Generates a PDF statement of all invoices for the selected period and opens it in a new tab.</p></div>',
    '<button class="btn btn-secondary" onclick="closeModal(\'cl-statement\')">Cancel</button>' +
    '<button class="btn btn-primary" id="stmt-btn" data-cid="'+clientId+'" onclick="_doClientStmt(this)">Generate PDF</button>',
    'modal-sm'
  );
}
async function _doClientStmt(btn) {
  var clientId = btn.getAttribute('data-cid');
  var from = (document.getElementById('stmt-from')||{}).value||'';
  var to   = (document.getElementById('stmt-to')||{}).value||'';
  if (!from||!to) { toast('Select a date range','warning'); return; }
  btn.disabled=true; btn.textContent='Generating...';
  var r = await api('generateClientStatement',{clientId:clientId,startDate:from,endDate:to});
  btn.disabled=false; btn.textContent='Generate PDF';
  if (r&&r.success) {
    closeModal('cl-statement');
    window.open(r.pdfUrl,'_blank');
    toast(r.invoiceCount+' invoice(s) · '+fmt(r.totalOutstanding)+' outstanding','success',5000);
  } else toast('Error: '+(r?r.message||r.error:'unknown'),'error');
}

// ── REMITTANCE ADVICE MODAL ───────────────────────────────────────────────────
var _remBillIds = [];
function openRemittanceModal(billIds, supplierName) {
  _remBillIds = billIds||[];
  var today = new Date().toISOString().split('T')[0];
  var bills = (App.data.bills||[]).filter(function(b){ return _remBillIds.indexOf(b.billId)>=0; });
  var total = bills.reduce(function(s,b){ return s+(parseFloat(b.total)||0); }, 0);
  openModal('su-remittance','Remittance Advice — '+(supplierName||''),
    '<div class="stats-grid" style="grid-template-columns:repeat(2,1fr);margin-bottom:12px">' +
      '<div class="stat-card" style="padding:10px"><div class="stat-label">Bills</div><div style="font-weight:700">'+bills.length+'</div></div>' +
      '<div class="stat-card" style="padding:10px"><div class="stat-label">Total</div><div style="font-weight:700">'+fmt(total)+'</div></div>' +
    '</div>' +
    '<div class="form-grid-2">' +
      '<div class="form-group"><label class="form-label">Payment Date</label>' +
        '<input type="date" class="form-input" id="rem-date" value="'+today+'"></div>' +
      '<div class="form-group"><label class="form-label">Payment Reference</label>' +
        '<input type="text" class="form-input" id="rem-ref" placeholder="e.g. BACS-001"></div>' +
    '</div>',
    '<button class="btn btn-secondary" onclick="closeModal(\'su-remittance\')">Cancel</button>' +
    '<button class="btn btn-primary" id="rem-btn" onclick="_doRemittance()">Generate PDF</button>',
    'modal-sm'
  );
}
async function _doRemittance() {
  var date = (document.getElementById('rem-date')||{}).value||'';
  var ref  = (document.getElementById('rem-ref')||{}).value||'';
  var btn  = document.getElementById('rem-btn');
  if (btn) { btn.disabled=true; btn.textContent='Generating...'; }
  var r = await api('generateRemittanceAdvice',{billIds:_remBillIds,paymentDate:date,paymentRef:ref});
  if (btn) { btn.disabled=false; btn.textContent='Generate PDF'; }
  if (r&&r.success) {
    closeModal('su-remittance');
    window.open(r.pdfUrl,'_blank');
    toast('Remittance advice generated · '+fmt(r.total),'success',4000);
  } else toast('Error: '+(r?r.message||r.error:'unknown'),'error');
}


// ═══════════════════════════════════════════════════════════════════════════
// RECURRING INVOICES PAGE
// ═══════════════════════════════════════════════════════════════════════════
var _recurringData = [];
function closeRecCreate() { closeModal('rec-create'); }
function closeRecEdit() { closeModal('rec-edit'); }
function closeRecDel() { closeModal('rec-del'); }
var _delRecId = null;

async function showRecurring() {
  showLoader();
  var r = await api('getAllRecurring');
  _recurringData = (r && r.success) ? r.recurring || [] : [];
  var cw = canWrite();
  var active = _recurringData.filter(function(r){return r.status==='Active';});
  var paused = _recurringData.filter(function(r){return r.status==='Paused';});

showContent(
    '<div class="page-hdr"><div><div class="page-title">Recurring Invoices</div>' +
    '<div class="page-sub">'+active.length+' active · '+paused.length+' paused</div></div>' +
    '<div class="page-actions">' +
    (cw?'<button class="btn btn-secondary btn-sm" onclick="runRecurringNow()">▶ Run Now</button> ':'')+
    (cw?'<button class="btn btn-primary" onclick="openRecCreateModal()">+ New Schedule</button>':'')+
    '</div></div>' +
    '<div class="alert alert-info" style="margin-bottom:14px">' +
    '<p>Recurring invoices are created automatically. Install the daily trigger once via <strong>Settings → Maintenance</strong> or the Run Now button above.</p></div>' +
    '<div class="tbl-wrap">' +
    (!_recurringData.length
      ? '<div class="empty"><h3>No recurring schedules</h3><p>Set up a recurring invoice to auto-generate invoices for regular clients.</p>'+(cw?'<button class="btn btn-primary" onclick="openRecCreateModal()">Create Schedule</button>':'')+' </div>'
      : '<table class="dt"><thead><tr>' +
          '<th>Client</th><th>Description</th><th>Frequency</th><th>Next Run</th>' +
          '<th>Last Run</th><th>Created</th><th>Status</th><th></th>' +
        '</tr></thead><tbody>' +
        _recurringData.map(function(r) {
          var due = r.nextRunDate && new Date(r.nextRunDate) < new Date();
          return '<tr>' +
            '<td><strong>'+r.clientName+'</strong></td>' +
            '<td style="color:var(--g500);font-size:12px">'+(r.description||r.lines.map(function(l){return l.description;}).join(', ')||'—')+'</td>' +
            '<td>'+badge(r.frequency)+'</td>' +
            '<td style="color:'+(due?'var(--amber-500)':'inherit')+'">'+(r.nextRunDate?fmtDate(r.nextRunDate):'—')+(due?' ⚠':'')+' </td>' +
            '<td>'+( r.lastRunDate?fmtDate(r.lastRunDate):'Never')+'</td>' +
            '<td style="font-size:11px;color:var(--g500)">'+r.invoiceCount+' invoice'+(r.invoiceCount!==1?'s':'')+' </td>' +
            '<td>'+badge(r.status)+'</td>' +
            '<td style="white-space:nowrap">' +
              (cw?'<button class="btn btn-ghost btn-xs" onclick="openRecEditModal(\''+r.recurringId+'\')">Edit</button> ':'')+
              (cw&&r.status==='Active'?'<button class="btn btn-ghost btn-xs" onclick="pauseRecurring(\''+r.recurringId+'\')">Pause</button> ':'')+
              (cw&&r.status==='Paused'?'<button class="btn btn-ghost btn-xs" onclick="resumeRecurring(\''+r.recurringId+'\')">Resume</button> ':'')+
              (cw?'<button class="btn btn-ghost btn-xs" style="color:var(--red-500)" onclick="confirmDelRecurring(\''+r.recurringId+'\')">Delete</button>':'')+
            '</td>' +
          '</tr>';
        }).join('') +
        '</tbody></table>' +
        '<div class="tbl-foot"><span>'+_recurringData.length+' schedules</span></div>'
    ) + '</div>'
  );
}

async function runRecurringNow() {
  var r = await api('processRecurringInvoices');
  if (r&&r.success) {
    var n = (r.created||[]).length;
    toast(n ? n+' invoice(s) created' : 'No invoices due today','success');
    if (n) showRecurring();
  } else toast('Error: '+(r?r.message||r.error:'unknown'),'error');
}

function openRecCreateModal() {
  var today = new Date().toISOString().split('T')[0];
  var clients = (App.data.clients||[]).map(function(c){
    return '<option value="'+c.clientId+'">'+c.clientName+'</option>';
  }).join('');
  openModal('rec-create','New Recurring Invoice',
    '<div class="form-grid-2">' +
      '<div class="form-group"><label class="form-label">Client *</label>' +
        '<select class="form-select" id="rec-client"><option value="">Select client...</option>'+clients+'</select></div>' +
      '<div class="form-group"><label class="form-label">Frequency *</label>' +
        '<select class="form-select" id="rec-freq">' +
          '<option value="monthly">Monthly</option>' +
          '<option value="weekly">Weekly</option>' +
          '<option value="quarterly">Quarterly</option>' +
          '<option value="annual">Annual</option>' +
          '<option value="daily">Daily</option>' +
        '</select></div>' +
      '<div class="form-group"><label class="form-label">Day of Month (for monthly)</label>' +
        '<input type="number" class="form-input" id="rec-dom" min="1" max="28" value="1" placeholder="1-28"></div>' +
      '<div class="form-group"><label class="form-label">Start Date</label>' +
        '<input type="date" class="form-input" id="rec-start" value="'+today+'"></div>' +
      '<div class="form-group"><label class="form-label">End Date (optional)</label>' +
        '<input type="date" class="form-input" id="rec-end"></div>' +
      '<div class="form-group"><label class="form-label">Description (appears on invoice)</label>' +
        '<input type="text" class="form-input" id="rec-desc" placeholder="e.g. Monthly retainer"></div>' +
    '</div>' +
    '<div class="form-group"><label class="form-label">Line Items</label>' +
      '<div id="rec-lines"></div>' +
      '<button class="btn btn-ghost btn-sm" style="margin-top:6px" onclick="_addRecLine()">+ Add Line</button>' +
    '</div>',
    '<button class="btn btn-secondary" onclick="closeRecCreate()">Cancel</button>' +
    '<button class="btn btn-primary" id="rec-save" onclick="saveRecurring()">Create Schedule</button>',
    'modal-lg'
  );
  _recLines = [{ description:'', qty:1, unitPrice:0, vatRate:_defaultVatRate() }];
  _renderRecLines();
}

var _recLines = [];
function _renderRecLines() {
  var el = document.getElementById('rec-lines'); if (!el) return;
  el.innerHTML = '<table style="width:100%;border-collapse:collapse"><thead><tr>' +
    '<th style="padding:4px 6px;font-size:10px;color:var(--g500);text-transform:uppercase">Description</th>' +

async function saveRecurring() {
  var clientId = (document.getElementById('rec-client')||{}).value||'';
  var freq     = (document.getElementById('rec-freq')||{}).value||'monthly';
  var dom      = parseInt((document.getElementById('rec-dom')||{}).value)||1;
  var start    = (document.getElementById('rec-start')||{}).value||'';
  var end      = (document.getElementById('rec-end')||{}).value||'';
  var desc     = (document.getElementById('rec-desc')||{}).value||'';
  var client   = (App.data.clients||[]).find(function(c){return c.clientId===clientId;});
  if (!clientId) { toast('Select a client','warning'); return; }
  var lines = _recLines.filter(function(l){return l.description && parseFloat(l.unitPrice)>0;});
  if (!lines.length) { toast('Add at least one line item','warning'); return; }
  var btn = document.getElementById('rec-save');
  if (btn) { btn.disabled=true; btn.textContent='Saving...'; }
  var r = await api('createRecurring',{
    clientId:clientId, clientName:client?client.clientName:'',
    lines:lines, frequency:freq, dayOfMonth:dom,
    startDate:start, endDate:end, description:desc
  });
  if (r&&r.success) {
    closeRecCreate();
    toast('Recurring schedule created · next run: '+fmtDate(r.nextRunDate),'success',4000);
    showRecurring();
  } else {
    if (btn) { btn.disabled=false; btn.textContent='Create Schedule'; }
    toast('Error: '+(r?r.message||r.error:'unknown'),'error');
  }
}

async function _sendWA(btn) {
  var invoiceId = btn.getAttribute('data-id');

  var body = (document.getElementById('wa-body')||{}).value||'';

  var r = await api('sendInvoiceWhatsApp',{ invoiceId:invoiceId, overrides:{ to:to, body:body||undefined } });

    closeModal('inv-whatsapp');

      '<a href="'+r.link+'" target="_blank" class="btn btn-primary btn-sm" style="margin-top:8px;display:inline-block">Open WhatsApp</a>';
    var modal = document.querySelector('#mb-inv-whatsapp .modal-body');

}

async function doSeedCOA() {

  if (btn) { btn.disabled = false; btn.textContent = '🌱 Seed Chart of Accounts'; }

  if (r && r.success) {
    var msg = r.created > 0
      ? r.created + ' accounts added' + (r.skipped > 0 ? ', ' + r.skipped + ' already existed' : '') + '.'
      : 'All ' + r.skipped + ' accounts already exist — nothing to add.';

  }
}




function updateFYPreview() {
  var el = document.getElementById('fy-preview'); if (!el) return;
  var yearEndDay = (document.getElementById('s_yearEndDay')||{}).value || '31 March';
  var bizStart   = (document.getElementById('s_businessStartDate')||{}).value || '';
  try {
    var now = new Date();
    // Parse year end day/month
    var parts = yearEndDay.trim().split(/\s+/);
    var endDay   = parseInt(parts[0]) || 31;
    var months   = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    var endMonth = months.indexOf(parts[1] || 'March'); // 0-indexed
    if (endMonth < 0) endMonth = 2; // default March
    // Determine current FY year
    var testEnd = new Date(now.getFullYear(), endMonth, endDay);
    var fyEndYear  = testEnd >= now ? now.getFullYear() : now.getFullYear() + 1;
    var fyEnd      = new Date(fyEndYear, endMonth, endDay);
    var fyStart    = new Date(fyEnd);
    fyStart.setFullYear(fyEnd.getFullYear() - 1);
    fyStart.setDate(fyStart.getDate() + 1);
    var fmt2 = function(d){ return d.getDate()+' '+ months[d.getMonth()]+' '+d.getFullYear(); };
    var preview = 'Current financial year: <strong>'+fmt2(fyStart)+'</strong> → <strong>'+fmt2(fyEnd)+'</strong>';
    // Show business start context
    if (bizStart) {
      var bs = new Date(bizStart);
      preview += '<br>Business started: <strong>'+fmt2(bs)+'</strong>';
      if (bs > fyStart) {
        var firstYearEnd = new Date(fyEnd);
        if (bs > fyEnd) { firstYearEnd.setFullYear(fyEnd.getFullYear()+1); }
        preview += ' · First year end: <strong>'+fmt2(firstYearEnd)+'</strong>';
      }
    }
    el.innerHTML = preview;
  } catch(e) { el.innerHTML = ''; }
}

async function uploadLogoFile(input) {
  var file = input.files[0]; if (!file) return;
  if (file.size > 204800) { toast('Logo too large — max 200KB', 'warning'); return; }
  var reader = new FileReader();
  reader.onload = async function(e) {
    var dataUrl = e.target.result;
    var base64  = dataUrl.split(',')[1];
    toast('Uploading logo...', 'info', 2000);
    var r = await api('uploadLogo', { base64Data:base64, fileName:file.name, fileType:file.type });
    if (r && r.success) {
      toast('Logo uploaded', 'success');
      var prev = document.getElementById('logo-preview');
      if (prev) { prev.src = dataUrl; }
      else {
        // Insert preview
        var lbl = input.parentElement;
        var img = document.createElement('img');
        img.id='logo-preview'; img.src=dataUrl;
        img.style.cssText='max-height:60px;max-width:180px;object-fit:contain;display:block;margin-bottom:8px;border:1px solid var(--g200);border-radius:4px;padding:4px';
        lbl.parentElement.insertBefore(img, lbl);
      }
      // Update settings cache
      if (App.data.settings) App.data.settings.logoURL = r.logoURL || dataUrl;
    } else toast('Upload error: '+(r?r.message||r.error:'unknown'), 'error');
  };
  reader.readAsDataURL(file);
}

    companyAddress:       g('companyAddress'),
    companyPostcode:      g('companyPostcode'),

    companyPhone:         g('companyPhone'),
    invoicePrefix:        g('invoicePrefix'),
    nextInvoiceNumber:    parseInt(g('nextInvoiceNumber'))||1,
    billPrefix:           g('billPrefix'),
    nextBillNumber:       parseInt(g('nextBillNumber'))||1,
    poPrefix:             g('poPrefix'),
    nextPONumber:         parseInt(g('nextPONumber'))||1,
    defaultPaymentTerms:  parseInt(g('defaultPaymentTerms'))||30,
    invoiceFooter:        g('invoiceFooter'),
    templateAccentColor:  g('templateAccentColor'),
    templateLogoPosition: g('templateLogoPosition'),
    templateShowReference:gc('templateShowReference'),
    templateFont:         g('templateFont'),
    vatRegistered:        gc('vatRegistered'),
    baseCurrency:         g('baseCurrency'),
    enabledCurrencies:    Array.from(document.querySelectorAll('.curr-toggle:checked')).map(function(cb){return cb.value;}),
    vatRegNumber:         g('vatRegNumber'),
    vatScheme:            g('vatScheme'),
    vatRate:              parseFloat(g('vatRate'))||20,
    vatFrequency:         g('vatFrequency'),
    yearEndDay:           g('yearEndDay')||'31 March',
    businessStartDate:    g('businessStartDate'),
    hmrcTestMode:         gc('hmrcTestMode'),
    emailSubject:         g('emailSubject'),
    emailBody:            g('emailBody'),
    bankName:             g('bankName'),
    accountName:          g('accountName'),
    sortCode:             g('sortCode'),
    accountNumber:        g('accountNumber')
  };
  // Only send HMRC credentials if non-empty
  var clientId     = g('hmrcClientID');
  var clientSecret = g('hmrcClientSecret');
  if (clientId)     d.hmrcClientID     = clientId;
  if (clientSecret) d.hmrcClientSecret = clientSecret;

  var btn = document.querySelector('.page-actions .btn-primary');
  if (btn) { btn.disabled=true; btn.textContent='Saving...'; }
  var r = await api('updateSettings', d);
  if (r && r.success) {
    toast('Settings saved', 'success');
    // Reload settings from backend to ensure App.settings reflects actual saved state
    var fresh = await api('getSettings');
    if (fresh && fresh.success !== false) {
      App.data.settings = fresh.settings || fresh;
      App.settings      = App.data.settings;

    }
    updateChrome();
    loadHMRCStatusBar();
  } else {
    toast('Error: '+(r?r.message||r.error:'unknown'), 'error');
  }
  if (btn) { btn.disabled=false; btn.textContent='💾 Save Changes'; }
}

var _coaRevenue  = [];  // 4xxx income accounts
var _coaExpenses = [];  // 5xxx-8xxx expense accounts

async function _loadCOAAccounts() {
  var r = await api('getAccounts', { filters:{ activeOnly:true } });
  if (!r||!r.success) return;
  _coaRevenue  = (r.accounts||[]).filter(function(a){ return a.accountCode && a.accountCode.charAt(0)==='4'; });
  _coaExpenses = (r.accounts||[]).filter(function(a){ return a.accountCode && '5678'.indexOf(a.accountCode.charAt(0))>=0; });
  // Re-render if modals already open
  if (document.getElementById('ic-lines')) renderInvLines();
  if (document.getElementById('bl-lines')) renderBillLines();
}

function _coaSelect(list, selectedCode, idx, type) {
  var defaultCode = type==='revenue' ? '4000' : '6000';
  var sel = selectedCode || defaultCode;
  var opts = list.map(function(a){
    return '<option value="'+a.accountCode+'"'+(a.accountCode===sel?' selected':'')+'>'+a.accountCode+' '+a.accountName+'</option>';
  }).join('');
  if (!opts) return '<input class="form-input" style="padding:4px 6px;font-size:11px;width:120px" value="'+sel+'" placeholder="COA code" onchange="'+type+'Lines['+idx+'].accountCode=this.value">';
  return '<select class="form-select" style="padding:4px 6px;font-size:11px" onchange="'+(type==='revenue'?'_invLines':type==='po'?'_poLines':type==='ree'?'_reeLines':'_billLines')+'['+idx+'].accountCode=this.value">'+
    (list.find(function(a){return a.accountCode===sel;})?'':'<option value="'+sel+'">'+sel+'</option>')+
    opts+'</select>';
}

function _setInvClientCurrency(clientId) {

async function _onBillCurrencyChange() {
  var base = (App.settings&&App.settings.baseCurrency)||'GBP';
  var curr = (document.getElementById('bl-currency')||{}).value||base;
  var rateEl = document.getElementById('bl-fxrate');
  var infoEl = document.getElementById('bl-rate-info');
  if (!rateEl) return;
  if (curr === base) { rateEl.value=''; rateEl.style.display='none'; if (infoEl) infoEl.textContent=''; return; }
  rateEl.style.display='';
  var r = await api('getAvailableRates');
  if (r&&r.success&&r.rates[curr]) {
    rateEl.value = r.rates[curr];
    if (infoEl) infoEl.textContent='1 '+curr+' = '+r.rates[curr]+' '+base+' (ECB '+r.rates._date+')';
  } else { if (infoEl) infoEl.textContent='Enter rate manually'; }
}
async function _onInvCurrencyChange() {
  var base = (App.settings&&App.settings.baseCurrency)||'GBP';
  var curr = (document.getElementById('ic-currency')||{}).value||base;
  var rateEl = document.getElementById('ic-fxrate');
  var infoEl = document.getElementById('ic-rate-info');
  if (!rateEl) return;
  if (curr === base) {
    rateEl.value=''; rateEl.style.display='none';
    if (infoEl) infoEl.textContent='';
    return;
  }
  rateEl.style.display='';
  // Fetch live rate
  var r = await api('getAvailableRates');
  if (r&&r.success&&r.rates[curr]) {
    rateEl.value = r.rates[curr];
    if (infoEl) infoEl.textContent='1 '+curr+' = '+r.rates[curr]+' '+base+' (ECB '+r.rates._date+')';
  } else {
    if (infoEl) infoEl.textContent='Enter rate manually';
  }
}
function _defaultVatRate() {
  var s = App.settings||{};
  var reg = s.vatRegistered===true || s.vatRegistered==='true' || s.vatRegistered==='TRUE';
  return reg ? (parseFloat(s.vatRate)||20) : 0;
}

function addInvLine() {
  _invLines.push({ description:'', qty:1, unitPrice:0, vatRate:_defaultVatRate() });
  renderInvLines();
}
function removeInvLine(i) {
  _invLines.splice(i, 1);
  if (!_invLines.length) _invLines.push({ description:'', qty:1, unitPrice:0, vatRate:_defaultVatRate() });
  renderInvLines();
}
function renderInvLines() {
  var tb = document.getElementById('ic-lines'); if (!tb) return;
  var mode = (document.getElementById('ic-taxmode')||{}).value || 'exclusive';
  tb.innerHTML = _invLines.map(function(l, i) {
    var rate = parseFloat(l.vatRate); if (isNaN(rate)||rate<0) rate=0;
    var net  = (parseFloat(l.qty)||0)*(parseFloat(l.unitPrice)||0);
    var vat  = mode==='none' ? 0 : (mode==='inclusive' ? net-(net/(1+rate/100)) : net*rate/100);
    var tot  = mode==='inclusive' ? net : (net+vat);
    var vatSel = '<select class="form-select" style="padding:4px 6px;font-size:12px" onchange="_invLines['+i+'].vatRate=parseFloat(this.value)||0;renderInvLines()">' +
      [['20','20% Standard'],['5','5% Reduced'],['0','0% Zero'],['exempt','Exempt']].map(function(o){
        var v = String(l.vatRate!==undefined?l.vatRate:_defaultVatRate());
        return '<option value="'+o[0]+'"'+(v===o[0]||v===String(parseFloat(o[0]))?' selected':'')+'>'+o[1]+'</option>';
      }).join('') + '</select>';
    return '<tr>' +
      '<td style="padding:3px"><input class="form-input" style="padding:5px 8px;font-size:13px" placeholder="Description" value="'+(l.description||'')+'" oninput="_invLines['+i+'].description=this.value"></td>' +
      '<td style="padding:3px"><input class="form-input" style="padding:5px 7px;font-size:13px;text-align:right" type="number" min="0.01" step="0.01" value="'+(l.qty||1)+'" oninput="if(this.value&&!isNaN(this.value))_invLines['+i+'].qty=parseFloat(this.value)||1" onchange="_invLines['+i+'].qty=parseFloat(this.value)||1;updateInvTotals()"></td>' +
      '<td style="padding:3px"><input class="form-input" id="ic-price-'+i+'" style="padding:5px 7px;font-size:13px;text-align:right" type="number" min="0" step="0.01" value="'+(l.unitPrice||0)+'" oninput="if(this.value&&!isNaN(this.value))_invLines['+i+'].unitPrice=parseFloat(this.value)||0" onchange="_invLines['+i+'].unitPrice=parseFloat(this.value)||0;updateInvTotals()"></td>' +
      '<td style="padding:3px">'+vatSel+'</td>' +
      '<td style="padding:3px">'+_coaSelect(_coaRevenue, l.accountCode, i, 'revenue')+'</td>' +
      '<td style="padding:3px;text-align:right"><span class="mono" style="font-size:12px">'+fmt(tot)+'</span></td>' +
      '<td style="padding:3px;text-align:center"><button onclick="removeInvLine('+i+')" style="background:none;border:none;color:var(--g400);cursor:pointer;font-size:16px;line-height:1;padding:1px 4px">×</button></td>' +
    '</tr>';
  }).join('');
  updateInvTotals();
}
function updateInvTotals() {
  var mode = (document.getElementById('ic-taxmode')||{}).value || 'exclusive';
  var sub=0, vat=0;
  _invLines.forEach(function(l) {
    var rate = parseFloat(l.vatRate); if (isNaN(rate)||rate<0) rate=0;
    var lineAmt = (parseFloat(l.qty)||0)*(parseFloat(l.unitPrice)||0);
    if (mode==='inclusive') {
      var net = lineAmt/(1+rate/100); sub+=net; vat+=lineAmt-net;
    } else if (mode==='none') {
      sub+=lineAmt;
    } else {
      sub+=lineAmt; vat+=lineAmt*rate/100;
    }
  });
  var subEl=document.getElementById('ic-sub'), vatEl=document.getElementById('ic-vat'), totEl=document.getElementById('ic-total');
  if(subEl) subEl.textContent=fmt(sub);
  if(vatEl) vatEl.textContent=fmt(vat);
  if(totEl) totEl.textContent=fmt(sub+vat);
}
async function saveInvoice() {
  var clientId = document.getElementById('ic-client').value;
  var issueDate = document.getElementById('ic-issue').value;
  var dueDate   = document.getElementById('ic-due').value;
  var notes     = document.getElementById('ic-notes').value;
  if (!clientId) { toast('Please select a client', 'warning'); return; }
  if (!dueDate)  { toast('Please set a due date', 'warning'); return; }
  var lines = _invLines.filter(function(l){ return l.description && parseFloat(l.unitPrice) > 0; });
  if (!lines.length) { toast('Add at least one line item', 'warning'); return; }
  var btn = document.getElementById('ic-save');
  if (btn) { btn.disabled = true; btn.textContent = 'Saving...'; }
  var taxMode = (document.getElementById('ic-taxmode')||{}).value||'exclusive';
  var lineData = lines.map(function(l) {
    var rate  = parseFloat(l.vatRate)||0;
    var price = parseFloat(l.unitPrice)||0;
    // If inclusive: store net price (back-calculate from gross)
    var netPrice = taxMode==='inclusive' && rate>0 ? Math.round(price/(1+rate/100)*10000)/10000 : price;
    return {
      description: l.description,
      quantity:    parseFloat(l.qty)||1,
      unitPrice:   netPrice,
      vatRate:     taxMode==='none' ? 0 : rate,
      accountCode: l.accountCode || '4000'
    };
  });
  var invCurrency = (document.getElementById('ic-currency')||{}).value||'';
  var invFxRate   = parseFloat((document.getElementById('ic-fxrate')||{}).value)||1;
  var r = await api('createInvoice', { clientId:clientId, lines:lineData, issueDate:issueDate, dueDate:dueDate, notes:notes, currency:invCurrency, exchangeRate:invFxRate });
  if (r && r.success) {
    closeModal('inv-create');
    toast('Invoice ' + r.invoiceNumber + ' created', 'success');
    // Refresh invoices list and settings (to update next invoice number)
    var fresh = await api('getAllInvoices');
    if (fresh && fresh.success) App.data.invoices = fresh.invoices || [];
    var freshSettings = await api('getSettings');
    if (freshSettings && freshSettings.settings) {
      App.data.settings = freshSettings.settings;
      App.settings = freshSettings.settings;
    }
    showInvoices();
  } else {
    if (btn) { btn.disabled = false; btn.textContent = 'Create Invoice'; }
    toast('Error: ' + (r ? r.message||r.error : 'unknown'), 'error');
  }
}

async function saveInvoicePayment(invoiceId) {
  var amount  = parseFloat(document.getElementById('ip-amount').value);
  var date    = document.getElementById('ip-date').value;
  var bankId  = document.getElementById('ip-bank').value;
  var notes   = document.getElementById('ip-notes').value;
  if (!amount || amount <= 0) { toast('Enter a valid amount', 'warning'); return; }
  if (!bankId) { toast('Select a bank account', 'warning'); return; }
  var btn = document.getElementById('ip-save');
  if (btn) { btn.disabled = true; btn.textContent = 'Saving...'; }
  var r = await api('recordPayment', { invoiceId:invoiceId, amount:amount, paymentDate:date, bankAccountId:bankId, notes:notes });
  if (r && r.success) {
    closeModal('inv-pay');
    toast('Payment recorded', 'success');
    showInvoices();
  } else {
    if (btn) { btn.disabled = false; btn.textContent = 'Record Payment'; }
    toast('Error: ' + (r ? r.message||r.error : 'unknown'), 'error');
  }
}

async function saveClient(clientId) {
  var data = {
    clientName:   document.getElementById('cl-name').value.trim(),
    contactName:  document.getElementById('cl-contact').value.trim(),
    email:        document.getElementById('cl-email').value.trim(),
    phone:        document.getElementById('cl-phone').value.trim(),
    address:      document.getElementById('cl-address').value.trim(),
    postcode:     document.getElementById('cl-postcode').value.trim(),
    vatRegNumber: document.getElementById('cl-vat').value.trim(),
    paymentTerms: parseInt(document.getElementById('cl-terms').value)||30,
    notes:          document.getElementById('cl-notes').value.trim(),
    whatsappNumber: (document.getElementById('cl-whatsapp')||{}).value||'',
    defaultCurrency:(document.getElementById('cl-currency')||{}).value||''
  };
  if (!data.clientName) { toast('Client name is required', 'warning'); return; }
  var btn = document.getElementById('cl-save');
  if (btn) { btn.disabled = true; btn.textContent = 'Saving...'; }
  var action = clientId ? 'updateClient' : 'createClient';
  if (clientId) data.clientId = clientId;
  var r = await api(action, data);
  if (r && r.success) {
    closeModal(clientId ? 'cl-edit' : 'cl-create');
    toast('Client ' + (clientId ? 'updated' : 'created'), 'success');
    var fresh = await api('getAllClients');
    if (fresh && fresh.success) App.data.clients = fresh.clients || [];
    showClients();
  } else {
    if (btn) { btn.disabled = false; btn.textContent = clientId ? 'Save Changes' : 'Create Client'; }
    toast('Error: ' + (r ? r.message||r.error : 'unknown'), 'error');
  }
}

function addBillLine() {
  _billLines.push({ description:'', qty:1, unitPrice:0, vatRate:_defaultVatRate() });
  renderBillLines();
}
function removeBillLine(i) {
  _billLines.splice(i, 1);
  if (!_billLines.length) _billLines.push({ description:'', qty:1, unitPrice:0, vatRate:_defaultVatRate() });
  renderBillLines();
}
function renderBillLines() {
  var tb = document.getElementById('bl-lines'); if (!tb) return;
  tb.innerHTML = _billLines.map(function(l, i) {
    var tot = (parseFloat(l.qty)||0)*(parseFloat(l.unitPrice)||0)*(1+(parseFloat(l.vatRate)||0)/100);
    return '<tr>' +
      '<td style="padding:4px"><input class="form-input" style="padding:6px 8px;font-size:13px" placeholder="Description" value="'+(l.description||'')+'" oninput="_billLines['+i+'].description=this.value"></td>' +
      '<td style="padding:4px"><input class="form-input" style="padding:6px 8px;font-size:13px;text-align:right" type="number" min="0.01" step="0.01" value="'+(l.qty||1)+'" onchange="_billLines['+i+'].qty=parseFloat(this.value)||1;updateBillTotals()"></td>' +
      '<td style="padding:4px"><input class="form-input" style="padding:6px 8px;font-size:13px;text-align:right" type="number" min="0" step="any" value="'+(l.unitPrice||'')+'" oninput="_billLines['+i+'].unitPrice=parseFloat(this.value)||0;updateBillTotals()"></td>' +
      '<td style="padding:4px"><input class="form-input" style="padding:6px 8px;font-size:13px;text-align:right" type="number" min="0" max="100" step="0.01" value="'+(l.vatRate!==undefined?l.vatRate:_defaultVatRate())+'" oninput="_billLines['+i+'].vatRate=this.value;updateBillTotals()"></td>' +
      '<td style="padding:3px">'+_coaSelect(_coaExpenses, l.accountCode, i, 'expense')+'</td>' +
      '<td style="padding:4px;text-align:right"><span class="mono" style="font-size:13px">'+fmt(tot)+'</span></td>' +
      '<td style="padding:4px 2px;text-align:center"><button onclick="removeBillLine('+i+')" style="background:none;border:none;color:var(--g400);cursor:pointer;font-size:16px;line-height:1;padding:2px 4px">×</button></td>' +
    '</tr>';
  }).join('');
  updateBillTotals();
}
function updateBillTotals() {
  var sub=0, vat=0;
  _billLines.forEach(function(l) {
    var s=(parseFloat(l.qty)||0)*(parseFloat(l.unitPrice)||0);
    sub+=s; vat+=s*(parseFloat(l.vatRate)||0)/100;
  });
  var curr = (document.getElementById('bl-currency')||{}).value || ((App.settings&&App.settings.baseCurrency)||'GBP');
  var fmtC = function(n){ return (typeof _fmtCurr === 'function') ? _fmtCurr(n, curr) : fmt(n); };
  var se=document.getElementById('bl-sub'),ve=document.getElementById('bl-vat'),te=document.getElementById('bl-total');
  if(se)se.textContent=fmtC(sub); if(ve)ve.textContent=fmtC(vat); if(te)te.textContent=fmtC(sub+vat);
  var hdr=document.getElementById('bl-price-hdr');
  if(hdr) hdr.textContent = curr===((App.settings&&App.settings.baseCurrency)||'GBP') ? 'Unit Price' : 'Unit Price ('+curr+')';
}
async function saveBill() {
  var supplierId = document.getElementById('bl-supplier').value;
  var issueDate  = document.getElementById('bl-issue').value;
  var dueDate    = document.getElementById('bl-due').value;
  var notes      = document.getElementById('bl-notes').value;
  if (!supplierId) { toast('Select a supplier', 'warning'); return; }
  if (!dueDate)    { toast('Set a due date', 'warning'); return; }
  var lines = _billLines.filter(function(l){ return l.description && parseFloat(l.unitPrice)>0; });
  if (!lines.length) { toast('Add at least one line item', 'warning'); return; }
  var btn = document.getElementById('bl-save');
  if (btn) { btn.disabled=true; btn.textContent='Saving...'; }
  var lineData = lines.map(function(l) {
    return { description:l.description, quantity:parseFloat(l.qty)||1, unitPrice:parseFloat(l.unitPrice)||0, vatRate:parseFloat(l.vatRate)||0, accountCode:l.accountCode||'6000' };
  });
  var billCurrency = (document.getElementById('bl-currency')||{}).value||'';
  var billFxRate   = parseFloat((document.getElementById('bl-fxrate')||{}).value)||1;
  var r = await api('createBill', { supplierId:supplierId, lines:lineData, issueDate:issueDate, dueDate:dueDate, notes:notes, currency:billCurrency, exchangeRate:billFxRate });
  if (r && r.success) {
    closeModal('bl-create');
    toast('Bill created', 'success');
    var fresh = await api('getAllBills');
    if (fresh && fresh.success) App.data.bills = fresh.bills || [];
    showBills();
  } else {
    if (btn) { btn.disabled=false; btn.textContent='Create Bill'; }
    toast('Error: '+(r?r.message||r.error:'unknown'), 'error');
  }
}

async function saveBillPayment(billId) {
  var amount = parseFloat(document.getElementById('bp-amount').value);
  var date   = document.getElementById('bp-date').value;
  var bankId = document.getElementById('bp-bank').value;
  var notes  = document.getElementById('bp-notes').value;
  if (!amount||amount<=0) { toast('Enter a valid amount','warning'); return; }
  if (!bankId) { toast('Select a bank account','warning'); return; }
  var btn = document.getElementById('bp-save');
  if (btn) { btn.disabled=true; btn.textContent='Saving...'; }
  var r = await api('recordBillPayment', { billId:billId, amount:amount, paymentDate:date, bankAccountId:bankId, notes:notes });
  if (r && r.success) {
    closeModal('bl-pay');
    toast('Payment recorded','success');
    showBills();
  } else {
    if (btn) { btn.disabled=false; btn.textContent='Record Payment'; }
    toast('Error: '+(r?r.message||r.error:'unknown'), 'error');
  }
}

async function saveCreditNote() {
  var invoiceId = document.getElementById('cn-invoice').value;
  var date      = document.getElementById('cn-date').value;
  var amount    = parseFloat(document.getElementById('cn-amount').value);
  var reason    = document.getElementById('cn-reason').value.trim();
  if (!invoiceId) { toast('Select an invoice', 'warning'); return; }
  if (!amount || amount <= 0) { toast('Enter a valid amount', 'warning'); return; }
  if (!reason) { toast('Enter a reason', 'warning'); return; }
  var btn = document.getElementById('cn-save');
  if (btn) { btn.disabled=true; btn.textContent='Saving...'; }
  var vatRate = parseFloat((document.getElementById('cn-vat')||{}).value)||0;
  var lines = [{ description: reason, quantity: 1, unitPrice: amount, vatRate: vatRate }];
  var r = await api('createCreditNote', { invoiceId:invoiceId, lines:lines, reason:reason, issueDate:date });
  if (r && r.success) {
    closeModal('cn-create');
    toast('Credit note created', 'success');
    showCreditNotes();
  } else {
    if (btn) { btn.disabled=false; btn.textContent='Create Credit Note'; }
    toast('Error: ' + (r ? r.message||r.error : 'unknown'), 'error');

var _importCSV = null;
function previewImport(input) {
  var file = input.files[0]; if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    _importCSV = e.target.result;
    var lines = _importCSV.split('\n').slice(0,7);
    var preview = document.getElementById('imp-preview');
    if (preview) {
      preview.innerHTML = '<div style="background:var(--g50);border:1px solid var(--g200);border-radius:var(--r8);padding:10px;margin-top:8px">' +
        '<div style="font-size:11px;font-weight:600;color:var(--g500);margin-bottom:6px">PREVIEW (first 6 rows)</div>' +
        '<code style="font-size:11px;color:var(--g700);white-space:pre-wrap;word-break:break-all">' +
        lines.map(function(l){ return escapeHtml(l); }).join('\n') + '</code></div>';
    }
    var btn = document.getElementById('imp-save');
    if (btn) btn.disabled = false;
  };
  reader.readAsText(file);
}
function escapeHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
async function saveImport() {

var _reconState = {
  accountId:     null,
  transactions:  [],   // all bank transactions for account
  unreconciled:  [],   // statement lines needing match
  bookEntries:   [],   // book entries (spend/receive) needing match
  selectedTx:    null, // currently selected statement line
  selectedBook:  null  // currently selected book entry
};
async function showReconciliation() {
  var id = App.data.selectedAccount;
  if (!id && App.data.bankAccounts.length) id = App.data.bankAccounts[0].accountId;
  if (!id) { showBanking(); return; }
  _reconState.accountId = id;
  showLoader();
  var r = await api('getBankTransactions', { accountId: id });
  if (!r || !r.success) {
    showContent('<div class="empty"><h3>Could not load transactions</h3>' +
      '<button class="btn btn-primary" onclick="showReconciliation()">Retry</button></div>');
    return;
  }
  var all = r.transactions || [];
  _reconState.transactions = all;
  // Statement lines = imported CSV rows
  _reconState.unreconciled = all.filter(function(t) {
    return (t.type === 'Statement' || t.category === 'Statement') && t.status !== 'Reconciled';
  });
  // Book entries = spend/receive that aren't yet reconciled
  _reconState.bookEntries = all.filter(function(t) {
    return t.type !== 'Statement' && t.category !== 'Statement' && t.status !== 'Reconciled';
  });
  _renderReconPage();
}
</script>
