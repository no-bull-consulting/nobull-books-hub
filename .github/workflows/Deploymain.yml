name: Deploy — Main Hub (Compliance Enhanced)

on:
  push:
    branches: [main]
    paths:
      - 'src/main/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Push to Google Apps Script
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp and Linting Tools
        run: |
          npm install -g @google/clasp
          npm install eslint eslint-plugin-google-apps-script

      # NEW: Phase 2 Security Scan
      - name: Run Security & Style Scan (Lint)
        run: |
          npx eslint src/main/**

      - name: Authenticate clasp
        run: |
          echo '${{ secrets.CLASP_TOKEN }}' > ~/.clasprc.json

      - name: Write .clasp.json
        run: |
          echo '{"scriptId":"${{ secrets.MAIN_SCRIPT_ID }}","rootDir":"src/main"}' > .clasp.json

      # Only push if the Lint step passed
      - name: Push to Apps Script
        run: clasp push --force

      - name: Deploy new version
        run: |
          if [ -n "${{ secrets.MAIN_DEPLOYMENT_ID }}" ]; then
            clasp deploy --deploymentId "${{ secrets.MAIN_DEPLOYMENT_ID }}" --description "Auto-deploy $(date +'%Y-%m-%d %H:%M') — ${{ github.sha }}"
          else
            clasp deploy --description "Auto-deploy $(date +'%Y-%m-%d %H:%M') — ${{ github.sha }}"
          fi

      # NEW: Automated Release Tagging for HMRC Audit Trail
      - name: Create Version Tag
        run: |
          TAG_NAME="v$(date +'%Y.%m.%d-%H%M')"
          git tag $TAG_NAME
          git push origin $TAG_NAME