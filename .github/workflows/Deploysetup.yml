name: Deploy — Setup Microservice

on:
  push:
    branches: [main]
    paths:
      - 'src/setup/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Push Setup Service to Google Apps Script
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Authenticate via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT_EMAIL }}

      - name: Generate clasp token
        run: |
          ACCESS_TOKEN=$(gcloud auth print-access-token)
          echo "{\"token\":{\"access_token\":\"${ACCESS_TOKEN}\",\"token_type\":\"Bearer\",\"expiry_date\":9999999999999},\"oauth2ClientSettings\":{\"clientId\":\"\",\"clientSecret\":\"\",\"redirectUri\":\"\"},\"isLocalCreds\":false}" > ~/.clasprc.json

      - name: Write .clasp.json
        run: |
          echo '{"scriptId":"${{ secrets.SETUP_SCRIPT_ID }}","rootDir":"src/setup"}' > .clasp.json

      - name: Push to Apps Script
        run: clasp push --force

      - name: Deploy new version
        run: |
          if [ -n "${{ secrets.SETUP_DEPLOYMENT_ID }}" ]; then
            clasp deploy --deploymentId "${{ secrets.SETUP_DEPLOYMENT_ID }}" --description "Setup service deploy $(date +'%Y-%m-%d %H:%M') — ${{ github.sha }}"
          else
            clasp deploy --description "Setup service deploy $(date +'%Y-%m-%d %H:%M') — ${{ github.sha }}"
          fi