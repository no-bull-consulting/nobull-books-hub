<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="mobile-web-app-capable" content="yes">
	<meta name="referrer" content="strict-origin-when-cross-origin">
	<meta name="referrer" content="no-referrer-when-downgrade">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="manifest" href="manifest.json">
    
    <title>no~bull books | Client Portal</title>
    
    <style>
        :root {
            --navy: #14213D;
            --teal: #14A8AE;
            --slate: #94a3b8;
            --bg: #0f172a;
            --card-bg: #1e293b;
        }

        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        /* Iframe for the Spoke Architecture */
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; display: none; }
        
        #portal-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white; text-align: center; padding: 20px; box-sizing: border-box; }
        .dashboard-box { background: var(--card-bg); padding: 32px; border-radius: 16px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); width: 100%; max-width: 440px; border: 1px solid #334155; }
        
        .logo-text { font-family: Georgia, serif; font-size: 24px; margin-bottom: 24px; font-weight: bold; }
        .logo-text span { color: var(--teal); }
        
        h3 { margin: 0 0 8px 0; font-size: 18px; }
        .subtitle { font-size: 13px; color: var(--slate); margin-bottom: 24px; line-height: 1.5; }

        /* Instance List Styling */
        #instance-list { display: flex; flex-direction: column; gap: 12px; max-height: 300px; overflow-y: auto; margin-bottom: 20px; }
        
        .company-card { 
            background: var(--bg); 
            padding: 16px; 
            border-radius: 10px; 
            border: 1px solid #334155; 
            cursor: pointer; 
            text-align: left; 
            transition: transform 0.2s, border-color 0.2s;
            border-left: 4px solid var(--teal);
        }
        .company-card:hover { transform: translateY(-2px); border-color: var(--teal); }
        .company-card .name { font-weight: 600; color: white; font-size: 15px; margin-bottom: 2px; }
        .company-card .meta { font-size: 11px; color: var(--slate); text-transform: uppercase; letter-spacing: 0.05em; }

        button.btn-action { 
            width: 100%; padding: 14px; background: var(--teal); color: white; border: none; 
            border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px; transition: opacity 0.2s; 
        }
        button.btn-action:hover { opacity: 0.9; }

        .spinner { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--teal); border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .footer-links { margin-top: 25px; padding-top: 20px; border-top: 1px solid #334155; display: flex; justify-content: space-between; font-size: 11px; }
        .footer-links a { color: var(--slate); text-decoration: none; }
        .footer-links a:hover { color: var(--teal); }
    </style>
</head>
<body>

<div id="portal-container">
    <div class="dashboard-box">
        <div class="logo-text">no~bull <span>books</span></div>
        
        <div id="auth-stage" style="text-align: center; padding: 40px;">
            <h3>Welcome</h3>
            <p style="color: #64748b; font-size: 14px; margin-bottom: 20px;">
                Sign in to access your business workspaces.
            </p>
            
            <div id="g_id_onload"
                 data-client_id="490062327176-b9q29mjh1dtd4cave1ct4c03ri90dkvc.apps.googleusercontent.com"
                 data-context="signin"
                 data-ux_mode="popup"
                 data-callback="handleSignIn"
                 data-auto_prompt="false">
            </div>

            <div class="g_id_signin"
                 data-type="standard"
                 data-shape="rectangular"
                 data-theme="filled_black"
                 data-text="signin_with"
                 data-size="large"
                 data-logo_alignment="left">
            </div>
        </div>

        <div id="dashboard-stage" style="display: none; padding: 20px;">
            <div id="loading-indicator" style="text-align: center; padding: 20px;">
                <div class="spinner"></div> <p style="font-size: 13px; color: #64748b; margin-top: 10px;">Fetching instances...</p>
            </div>
            
            <div id="instance-list"></div>

            <div style="margin-top: 30px; border-top: 1px solid #e2e8f0; padding-top: 20px; text-align: center;">
                <button onclick="signOut()" style="background: none; border: none; color: #ef4444; cursor: pointer; font-size: 12px;">
                    Sign Out
                </button>
            </div>
        </div>
        
    </div>
</div>

    <iframe id="appFrame"></iframe>


    <<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
    // 1. SET YOUR CONSTANTS HERE
    const ADMIN_API_URL = "https://script.google.com/macros/s/AKfycbzn0lviNLO7I-ket-X-wDIuGILA0pekIb9yppn9UWQ7NVUWyutLl4jnhIAC0W03c-Hs/exec"; 
    const ACTUAL_ID = "490062327176-b9q29mjh1dtd4cave1ct4c03ri90dkvc.apps.googleusercontent.com"; // Paste your full ID here

    const frame = document.getElementById('appFrame');
    const portal = document.getElementById('portal-container');

window.onload = function() {
    console.log("Portal ready. Awaiting Google Sign-In...");
};

// This function is called AUTOMATICALLY by the 'data-callback' above
function handleSignIn(response) {
    console.log("Sign-in successful, fetching workspaces...");
    document.getElementById('auth-stage').style.display = 'none';
    document.getElementById('dashboard-stage').style.display = 'block';
    fetchInstances();
}

    function fetchInstances() {
    const listContainer = document.getElementById('instance-list');
    const loader = document.getElementById('loading-indicator');
    const callbackName = 'jsonp_cb_' + Math.round(Math.random() * 1000000);

    loader.style.display = 'block';
    listContainer.innerHTML = '';

    window[callbackName] = function(data) {
        loader.style.display = 'none';
        
        if (data.success && data.instances && data.instances.length > 0) {
            // RENDER CARDS DIRECTLY HERE
            listContainer.innerHTML = data.instances.map(inst => `
                <div class="company-card" onclick="launchApp('${inst.sheetId}')" style="cursor: pointer; margin-bottom: 12px; padding: 15px; border: 1px solid #e2e8f0; border-radius: 8px; background: #fff; transition: transform 0.2s;">
                    <div class="name" style="font-weight: 600; color: #1e293b; font-size: 16px;">${inst.companyName}</div>
                    <div class="meta" style="font-size: 12px; color: #64748b; text-transform: uppercase; margin-top: 4px;">
                        ${inst.status || 'Active'}
                    </div>
                </div>
            `).join('');
        } else {
            listContainer.innerHTML = `
                <div style="text-align: center; padding: 20px;">
                    <p style="font-size: 14px; color: #64748b;">No workspaces found for ${data.email || 'your account'}.</p>
                    <button onclick="window.location.reload()" style="margin-top: 10px; color: #3b82f6; background: none; border: none; cursor: pointer;">Try Again</button>
                </div>
            `;
        }
        
        delete window[callbackName];
    };

    const script = document.createElement('script');
    const sep = ADMIN_API_URL.includes('?') ? '&' : '?';
    script.src = `${ADMIN_API_URL}${sep}action=getInstances&callback=${callbackName}`;
    document.body.appendChild(script);
}
        
        // Cleanup the script tag and the callback
        const scriptTags = document.querySelectorAll('script[src*="' + callbackName + '"]');
        scriptTags.forEach(tag => tag.remove());
        delete window[callbackName];
    };

    const script = document.createElement('script');
    // Ensure the URL is properly formed
    const separator = ADMIN_API_URL.includes('?') ? '&' : '?';
    script.src = `${ADMIN_API_URL}${separator}action=getInstances&callback=${callbackName}`;
    
    script.onerror = function() {
        loader.style.display = 'none';
        listContainer.innerHTML = '<p style="color: #ef4444; font-size: 13px;">Connection error. Please check your Hub deployment.</p>';
    };
    
    document.body.appendChild(script);
}

    function launchApp(sheetId) {
        portal.style.display = 'none';
        frame.style.display = 'block';
        frame.src = "https://script.google.com/a/macros/nobull.consulting/s/AKfycbxAr1fwnaEmr5Q3tD8_hOrj8zsQ8TtcAofQipYASdEDR4tKJG8liN-OEMIL1nnrka5j/exec?id=" + sheetId;
    }

    function signOut() {
        google.accounts.id.disableAutoSelect();
        window.location.reload();
    }
</script>
</body>
</html>
