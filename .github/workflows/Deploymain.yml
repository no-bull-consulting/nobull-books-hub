name: Deploy — Main Hub

on:
  push:
    branches: [main]
    paths:
      - 'src/main/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Push to Google Apps Script
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Authenticate via Workload Identity Federation
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT_EMAIL }}
          token_format: access_token

      - name: Generate clasp credentials
        run: |
          cat > ~/.clasprc.json << EOF
          {
            "token": {
              "access_token": "${{ steps.auth.outputs.access_token }}",
              "refresh_token": "",
              "token_type": "Bearer",
              "expiry_date": 9999999999999
            },
            "oauth2ClientSettings": {
              "clientId": "1072944905499-vm2v2i5dvn0a0d2o4ca36i1vge8cvbn.apps.googleusercontent.com",
              "clientSecret": "",
              "redirectUri": "http://localhost"
            },
            "isLocalCreds": false
          }
          EOF

      - name: Write .clasp.json
        run: |
          echo '{"scriptId":"${{ secrets.MAIN_SCRIPT_ID }}","rootDir":"src/main"}' > .clasp.json

      - name: Push to Apps Script
        run: clasp push --force

      - name: Deploy new version
        run: |
          if [ -n "${{ secrets.MAIN_DEPLOYMENT_ID }}" ]; then
            clasp deploy --deploymentId "${{ secrets.MAIN_DEPLOYMENT_ID }}" --description "Auto-deploy $(date +'%Y-%m-%d %H:%M') — ${{ github.sha }}"
          else
            clasp deploy --description "Auto-deploy $(date +'%Y-%m-%d %H:%M') — ${{ github.sha }}"
          fi