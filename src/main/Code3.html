<script>

function _renderReconPage() {
  var id    = _reconState.accountId;
  var acct  = (App.data.bankAccounts||[]).find(function(a){ return a.accountId === id; }) || {};
  var stmts = _reconState.unreconciled;   // imported statement lines
  var books = _reconState.bookEntries;    // system book entries

  var reconciledCount = _reconState.transactions.filter(function(t) {
    return t.status === 'Reconciled' && t.type !== 'Statement' && t.category !== 'Statement';
  }).length;

  var html =
    '<div class="page-hdr">' +
      '<div><div class="page-title">Reconcile — '+acct.accountName+'</div>' +
        '<div class="page-sub">'+acct.bankName+' · Balance: '+fmt(parseFloat(acct.currentBalance)||0)+'</div></div>' +
      '<div class="page-actions">' +
        '<button class="btn btn-secondary btn-sm" onclick="showReconciliation()">&#8592; Accounts</button>' +
        '<button class="btn btn-secondary btn-sm" onclick="openImportStatementModal()">&#128228; Import Statement</button>' +
      '</div>' +
    '</div>' +
    '<div class="stats-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:16px">' +
      '<div class="stat-card"><div class="stat-label">Statement Lines</div>' +
        '<div class="stat-value" style="color:var(--amber-500)">'+stmts.length+'</div></div>' +
      '<div class="stat-card"><div class="stat-label">Book Entries</div>' +
        '<div class="stat-value" style="color:var(--blue-600)">'+books.length+'</div></div>' +
      '<div class="stat-card"><div class="stat-label">Reconciled</div>' +
        '<div class="stat-value amt-pos">'+reconciledCount+'</div></div>' +
      '<div class="stat-card"><div class="stat-label">Last Reconciled</div>' +
        '<div style="font-size:13px;font-weight:600;margin-top:4px">'+(acct.lastReconciled ? fmtDate(acct.lastReconciled) : '<span style=\"color:var(--g400)\">Never</span>')+'</div></div>' +
    '</div>';

  if (!stmts.length && !books.length) {
    html += '<div class="empty"><div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="20 6 9 17 4 12"/></svg></div>' +
      '<h3>All reconciled!</h3><p>Nothing left to match.</p>' +
      '<button class="btn btn-secondary" onclick="showReconciliation()">&#8592; Back</button></div>';
    showContent(html);
    return;
  }

  if (!stmts.length) {
    html += '<div class="alert alert-info" style="margin-bottom:16px">' +
      '<p><strong>No statement lines imported yet.</strong> Import a bank statement CSV to start matching.</p>' +
      '<button class="btn btn-secondary btn-sm" onclick="openImportStatementModal()" style="margin-top:8px">&#128228; Import Statement</button></div>';
  }

  // Build book entry lookup map for auto-matching
  var bookMap = {};
  books.forEach(function(b) { bookMap[b.transactionId] = b; });

  // Auto-match by amount — find best book entry for each statement line
  function findMatch(stmtAmt) {
    var abs = Math.abs(stmtAmt);
    var match = null;
    books.forEach(function(b) {
      if (Math.abs(Math.abs(parseFloat(b.amount)||0) - abs) < 0.01) match = b;
    });
    return match;
  }

  // Build statement rows table
  var stmtRows = stmts.map(function(t) {
    var a     = parseFloat(t.amount) || 0;
    var match = findMatch(a);
    var rowStyle = match ? 'background:var(--green-50);' : '';
    var matchInfo = match
      ? '<div style="font-size:11px;color:var(--green-700);font-weight:600">&#10003; Auto-matched: '+
          (match.description||'')+'</div>'
      : '';

    // Book entry dropdown for manual selection
    var bookOpts = '<option value="">— select —</option>' +
      books.map(function(b) {
        var ba = parseFloat(b.amount)||0;
        var diff = Math.abs(Math.abs(ba) - Math.abs(a));
        var diffStr = diff < 0.01 ? '' : ' (&#916;'+fmt(diff)+')';
        return '<option value="'+b.transactionId+'"'+(match&&match.transactionId===b.transactionId?' selected':'')+'>'+
          fmtDate(b.date)+' · '+(b.description||'').substring(0,30)+' · '+fmt(Math.abs(ba))+diffStr+'</option>';
      }).join('');

    return '<tr id="stmt-'+t.transactionId+'" style="'+rowStyle+'">' +
      '<td>'+fmtDate(t.date)+'</td>' +
      '<td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+(t.description||'')+'">'+
        (t.description||'')+'<br>'+matchInfo+'</td>' +
      '<td class="mono '+(a>=0?'amt-pos':'amt-neg')+'">'+fmt(Math.abs(a))+'<br>' +
        '<span style="font-size:10px;color:var(--g400)">'+(a>=0?'CR':'DR')+'</span></td>' +
      '<td style="min-width:240px">' +
        '<select class="form-select" id="match-sel-'+t.transactionId+'" style="font-size:12px;padding:4px 8px">' +
          bookOpts +
        '</select>' +
      '</td>' +
      '<td>' +
        '<div style="display:flex;gap:4px;flex-wrap:wrap">' +
          '<button class="btn btn-primary btn-xs" onclick="_doMatch(\''+t.transactionId+'\')">&#10003; Match</button>' +
          '<button class="btn btn-ghost btn-xs" onclick="_doMarkStmt(\''+t.transactionId+'\')">Mark OK</button>' +
        '</div>' +
      '</td>' +
    '</tr>';
  }).join('');

  // Unmatched book entries table
  var bookRows = books.map(function(b) {
    var a = parseFloat(b.amount)||0;
    return '<tr>' +
      '<td>'+fmtDate(b.date)+'</td>' +
      '<td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+(b.description||'')+'">'+
        (b.description||'')+'</td>' +
      '<td><span class="badge badge-grey" style="font-size:10px">'+(b.type||b.category||'')+'</span></td>' +
      '<td class="mono '+(a>=0?'amt-pos':'amt-neg')+'">'+fmt(Math.abs(a))+'</td>' +
      '<td><button class="btn btn-ghost btn-xs" onclick="_doMarkBook(\''+b.transactionId+'\')">Mark OK</button></td>' +
    '</tr>';
  }).join('');

  html +=
    '<div style="display:grid;grid-template-columns:3fr 2fr;gap:16px;align-items:start">' +
      // LEFT: Statement lines
      '<div>' +
        '<div class="tbl-bar"><span class="tbl-title" style="color:var(--amber-600)">&#128196; Bank Statement Lines</span>' +
          '<span style="font-size:12px;color:var(--g400)">from imported CSV</span></div>' +
        (stmts.length
          ? '<table class="dt" style="font-size:12px"><thead><tr>' +
              '<th>Date</th><th>Description</th><th style="text-align:right">Amount</th>' +
              '<th>Match to book entry</th><th></th>' +
            '</tr></thead><tbody>'+stmtRows+'</tbody></table>'
          : '<div class="tbl-empty"><p>No statement lines — import a CSV first</p></div>') +
      '</div>' +
      // RIGHT: Unmatched book entries
      '<div>' +
        '<div class="tbl-bar"><span class="tbl-title" style="color:var(--blue-600)">&#128218; Unmatched Book Entries</span>' +
          '<span style="font-size:12px;color:var(--g400)">recorded in system</span></div>' +
        (books.length
          ? '<table class="dt" style="font-size:12px"><thead><tr>' +
              '<th>Date</th><th>Description</th><th>Type</th><th style="text-align:right">Amount</th><th></th>' +
            '</tr></thead><tbody>'+bookRows+'</tbody></table>'
          : '<div class="tbl-empty"><p>&#10003; All book entries matched</p></div>') +
      '</div>' +
    '</div>';

  showContent(html);
}

// Match a statement line to selected book entry
async function _doMatch(stmtId) {
  var sel = document.getElementById('match-sel-'+stmtId);
  var bookId = sel ? sel.value : '';
  if (!bookId) { toast('Select a book entry to match', 'warning'); return; }

  var r = await api('reconcileTransaction', {
    transactionId: stmtId,
    allocations: [{ documentType:'booked', documentId:bookId }]
  });
  if (r && r.success) {
    toast('Matched &#10003;', 'success');
    _reconState.unreconciled = _reconState.unreconciled.filter(function(t){ return t.transactionId!==stmtId; });
    _reconState.bookEntries  = _reconState.bookEntries.filter(function(t){ return t.transactionId!==bookId; });
    _reconState.selectedTx   = null;
    _reconState.selectedBook = null;
    _renderReconPage();
  } else {
    toast('Error: '+(r?r.message||r.error:'unknown'), 'error');
  }
}

// Mark statement line as reconciled with no book match (bank charge, interest etc)
async function _doMarkStmt(stmtId) {
  var r = await api('reconcileTransaction', { transactionId:stmtId, allocations:[] });
  if (r && r.success) {
    toast('Marked as reconciled', 'success');
    _reconState.unreconciled = _reconState.unreconciled.filter(function(t){ return t.transactionId!==stmtId; });
    _renderReconPage();
  } else toast('Error: '+(r?r.message||r.error:'unknown'), 'error');
}

// Mark book entry as reconciled with no statement match
async function _doMarkBook(bookId) {
  var r = await api('reconcileTransaction', { transactionId:bookId, allocations:[] });
  if (r && r.success) {
    toast('Marked as reconciled', 'success');
    _reconState.bookEntries = _reconState.bookEntries.filter(function(t){ return t.transactionId!==bookId; });
    _renderReconPage();
  } else toast('Error: '+(r?r.message||r.error:'unknown'), 'error');
}

async function quickMarkReconciled(txId) {
  var r = await api('reconcileTransaction', {
    transactionId: txId,
    allocations: []
  });
  if (r && r.success) {
    toast('Marked as reconciled', 'success');
    _reconState.unreconciled = _reconState.unreconciled.filter(function(t){ return t.transactionId!==txId; });
    _reconState.bookEntries  = _reconState.bookEntries.filter(function(t){ return t.transactionId!==txId; });
    if (_reconState.selectedTx === txId)   _reconState.selectedTx   = null;
    if (_reconState.selectedBook === txId) _reconState.selectedBook = null;
    _renderReconPage();
  } else {
    toast('Error: '+(r?r.message||r.error:'unknown'), 'error');
  }
}
// Quick reconcile from transaction list (on Banking page)
async function openQuickReconcileModal(transactionId) {
  _currentReconTxId = transactionId;
  var tx = (_reconState.transactions||[]).find(function(t){ return t.transactionId===transactionId; });
  var txAmt = tx ? Math.abs(parseFloat(tx.amount)||0) : 0;
  // Use cached invoices and bills — no extra api call
  var invs  = (App.data.invoices||[]).filter(function(i){ return i.status!=='Paid'&&i.status!=='Void'&&(parseFloat(i.amountDue)||0)>0; });
  var bills = (App.data.bills||[]).filter(function(b){ return b.status!=='Paid'&&b.status!=='Void'&&(parseFloat(b.amountDue)||0)>0; });
  var invOpts  = invs.map(function(i){ return '<option value="inv:'+i.invoiceId+'">INV '+i.invoiceNumber+' — '+i.clientName+' ('+fmt(i.amountDue)+')</option>'; }).join('');
  var billOpts = bills.map(function(b){ return '<option value="bil:'+b.billId+'">BILL '+b.billNumber+' — '+b.supplierName+' ('+fmt(b.amountDue)+')</option>'; }).join('');
  openModal('bk-reconcile', 'Reconcile Transaction',
    (tx ? '<div class="stats-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:14px">' +
      '<div class="stat-card" style="padding:12px"><div class="stat-label">Date</div><div style="font-weight:600">'+fmtDate(tx.date)+'</div></div>' +
      '<div class="stat-card" style="padding:12px"><div class="stat-label">Description</div><div style="font-weight:600;font-size:12px">'+(tx.description||'—')+'</div></div>' +
      '<div class="stat-card" style="padding:12px"><div class="stat-label">Amount</div><div style="font-weight:700">'+fmt(txAmt)+'</div></div>' +
    '</div>' : '') +
    '<div class="form-group"><label class="form-label">Match to</label>' +
      '<select class="form-select" id="rc-match">' +
        '<option value="">— Mark reconciled (no match) —</option>' +
        (invOpts  ? '<optgroup label="Outstanding Invoices">' + invOpts  + '</optgroup>' : '') +
        (billOpts ? '<optgroup label="Outstanding Bills">'    + billOpts + '</optgroup>' : '') +
      '</select>' +
    '</div>' +
    '<div class="form-group"><label class="form-label">Notes</label>' +
      '<input type="text" class="form-input" id="rc-notes" placeholder="Optional notes"></div>',
    '<button class="btn btn-secondary" onclick="closeBkRecon()">Cancel</button>' +
    '<button class="btn btn-primary" id="rc-save" onclick="saveCurrentRecon()">Reconcile</button>',
    'modal-md'
  );
}
async function saveReconcile(transactionId) {
  var match = (document.getElementById('rc-match')||{}).value || '';
  var notes = (document.getElementById('rc-notes')||{}).value || '';
  var allocations = [];
  if (match) {
    var parts = match.split(':');
    var docType = parts[0] === 'inv' ? 'Invoice' : 'Bill';
    allocations.push({ documentType:docType, documentId:parts[1], notes:notes });
  }
  var btn = document.getElementById('rc-save');
  if (btn) { btn.disabled=true; btn.textContent='Reconciling...'; }
  var r = await api('reconcileTransaction', { transactionId:transactionId, allocations:allocations });
  if (r && r.success) {
    closeModal('bk-reconcile');
    toast('Transaction reconciled', 'success');
    loadTx();
    loadRecInfo();
  } else {
    if (btn) { btn.disabled=false; btn.textContent='Reconcile'; }
    toast('Error: '+(r?r.message||r.error:'unknown'), 'error');
  }
}
// INVOICE DETAIL VIEW — with Void and Write Off as Bad Debt
// INVOICE DETAIL — Workflow + Attachments
var _pdfInvoiceId = null;
function closeViInv()     { closeModal('vi-inv'); }
function whatsAppCurrentInv() { openWhatsAppModal(_pdfInvoiceId); }
function pdfCurrentInv()  { downloadPDF(_pdfInvoiceId); }
function emailCurrentInv(){ sendEmail(_pdfInvoiceId); }
// Status workflow: Draft → Approved → Sent → Paid (+ Void, Bad Debt)
var _WORKFLOW = { 'Draft':'Approved', 'Approved':'Sent', 'Sent':'Paid' };
var _STATUS_LABELS = {
  'Draft':    { label:'Draft (Pro-Forma)', color:'var(--g500)',    desc:'Not a VAT document' },
  'Approved': { label:'Approved (Tax Invoice)', color:'var(--purple-600)', desc:'Included in VAT returns' },
  'Sent':     { label:'Sent', color:'var(--blue-600)',  desc:'Sent to client' },
  'Paid':     { label:'Paid', color:'var(--green-600)', desc:'Fully paid' },
  'Partial':  { label:'Partially Paid', color:'var(--amber-500)', desc:'' },
  'Void':     { label:'Void', color:'var(--g400)',     desc:'Reversed' },
  'Bad Debt': { label:'Bad Debt', color:'var(--red-500)', desc:'Written off' }
};
async function viewInvoice(invoiceId) {
  _pdfInvoiceId = invoiceId;
  var inv = (App.data.invoices||[]).find(function(i){ return i.invoiceId === invoiceId; });
  if (!inv) { toast('Invoice not found', 'error'); return; }
  _renderInvoiceModal(inv);
  // Load attachments in background after modal opens
  setTimeout(function(){ loadInvoiceAttachments(invoiceId); }, 100);
}
function _renderInvoiceModal(inv) {
  var invoiceId = inv.invoiceId;
  var cw        = canWrite();
  var status    = inv.status || 'Draft';
  var isVoid    = status === 'Void' || status === 'Voided';
  var isBadDebt = status === 'Bad Debt';
  var isDraft   = status === 'Draft';
  var isActive  = !isVoid && !isBadDebt;
  var amtPaid   = (parseFloat(inv.total)||0) - (parseFloat(inv.amountDue)||0);
  var statusInfo= _STATUS_LABELS[status] || { label:status, color:'var(--g500)', desc:'' };
  // Workflow bar
  var workflowHtml = _invoiceWorkflowBar(status);
  // Action buttons based on current status
  var actions = '';
  if (cw && isActive) {
    if (isDraft) {
      actions += '<button class="btn btn-primary btn-sm" onclick="approveInvoice(\''+invoiceId+'\')">✓ Approve</button> ';
      actions += '<button class="btn btn-ghost btn-sm" onclick="closeViInv();openEditInvoiceModal(\''+invoiceId+'\')">✏️ Edit</button> ';
      actions += '<button class="btn btn-danger btn-sm" onclick="confirmDeleteInvoice(\''+invoiceId+'\')">🗑 Delete</button> ';
    }
    if (status === 'Approved') {
      actions += '<button class="btn btn-primary btn-sm" onclick="doMarkSent(\''+invoiceId+'\')">📤 Mark Sent</button> ';
    }
    if (status === 'Approved' || status === 'Sent' || status === 'Partial') {
      actions += '<button class="btn btn-success btn-sm" onclick="closeViInv();openRecordPaymentModal(\''+invoiceId+'\')">💳 Record Payment</button> ';
    }
    if (status === 'Approved' || status === 'Sent' || status === 'Partial') {
      actions += '<button class="btn btn-secondary btn-sm" onclick="closeViInv();openCreateCreditNoteModal(\''+invoiceId+'\')">Credit Note</button> ';
    }
    if (!isDraft) {
      actions += '<button class="btn btn-secondary btn-sm" onclick="openVoidInvoiceModal(\''+invoiceId+'\')">Void</button> ';
    }
    if (status === 'Sent' || status === 'Partial' || status === 'Overdue') {
      actions += '<button class="btn btn-danger btn-sm" onclick="openWriteOffModal(\''+invoiceId+'\')">Bad Debt</button>';
    }
  }
  openModal('vi-inv', 'Invoice ' + (inv.invoiceNumber||''),
    // Status + workflow
    workflowHtml +
    // Stats
    '<div class="stats-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:14px">' +
      '<div class="stat-card" style="padding:12px"><div class="stat-label">Client</div><div style="font-weight:600;font-size:13px">'+(inv.clientName||'—')+'</div></div>' +
      '<div class="stat-card" style="padding:12px"><div class="stat-label">Issue Date</div><div style="font-weight:600">'+fmtDate(inv.issueDate)+'</div></div>' +
      '<div class="stat-card" style="padding:12px"><div class="stat-label">Due Date</div><div style="font-weight:600;color:var(--red-500)">'+fmtDate(inv.dueDate)+'</div></div>' +
      '<div class="stat-card" style="padding:12px"><div class="stat-label">Status</div><div style="font-weight:700;color:'+statusInfo.color+';margin-top:2px;font-size:12px">'+statusInfo.label+'</div>'+(statusInfo.desc?'<div style="font-size:10px;color:var(--g400)">'+statusInfo.desc+'</div>':'')+'</div>' +
    '</div>' +
    '<div class="stats-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:14px">' +
      '<div class="stat-card" style="padding:12px"><div class="stat-label">Total' +
        (inv.currency&&inv.currency!==((App.settings&&App.settings.baseCurrency)||'GBP')
          ? '<span style="font-size:10px;background:var(--blue-50);color:var(--blue-700);padding:1px 5px;border-radius:8px;margin-left:4px">'+inv.currency+'</span>' : '') +
        '</div><div class="stat-value" style="font-size:18px">'+fmt(inv.total)+'</div>' +
        (inv.currency&&inv.currency!==((App.settings&&App.settings.baseCurrency)||'GBP')
          ? '<div style="font-size:10px;color:var(--g400)">Rate: '+parseFloat(inv.exchangeRate||1).toFixed(5)+' · Base: '+fmt(inv.baseTotal||inv.total)+'</div>' : '') +
        '</div>' +
      '<div class="stat-card" style="padding:12px"><div class="stat-label">Amount Due</div><div class="stat-value" style="font-size:18px;color:var(--amber-500)">'+fmt(inv.amountDue)+'</div></div>' +
      '<div class="stat-card" style="padding:12px"><div class="stat-label">Amount Paid</div><div class="stat-value" style="font-size:18px;color:var(--green-600)">'+fmt(amtPaid)+'</div></div>' +
    '</div>' +
    // PDF / Email
    '<div style="display:flex;gap:8px;flex-wrap:wrap;padding:10px 0;border-top:1px solid var(--g100);border-bottom:1px solid var(--g100);margin-bottom:12px">' +
      '<button class="btn btn-secondary btn-sm" id="pdf-btn" onclick="pdfCurrentInv()">📄 Download PDF</button>' +
      '<button class="btn btn-secondary btn-sm" id="email-btn" onclick="emailCurrentInv()">✉️ Send by Email</button>' +
      '<button class="btn btn-ghost btn-sm" onclick="openClientStatementModal(\''+inv.clientId+'\',\''+inv.clientName+'\')">Statement</button>' +
      '<button class="btn btn-ghost btn-sm" onclick="openWhatsAppModal(\''+inv.invoiceId+'\')">WhatsApp</button>' +
      '<span style="flex:1"></span>' +
      '<span style="font-size:11px;color:var(--g400);align-self:center">'+(isDraft?'Pro-Forma — not a VAT document':'Tax Invoice — included in VAT')+'</span>' +
    '</div>' +
    // Workflow actions
    (actions ? '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">' + actions + '</div>' : '') +
    // Attachments section
    '<div><div style="font-size:12px;font-weight:600;color:var(--g700);margin-bottom:8px">📎 Internal Attachments</div>' +
    '<div id="inv-attachments"><div class="loader" style="height:60px"><div class="spin"></div></div></div>' +
    (cw && isActive ?
      '<div style="margin-top:8px"><label class="btn btn-ghost btn-sm" style="cursor:pointer">+ Attach File' +
        '<input type="file" style="display:none" onchange="attachToInvoice(this,\''+invoiceId+'\')" accept=".pdf,.doc,.docx,.xls,.xlsx,.png,.jpg,.jpeg"></label>' +
      '<span style="font-size:11px;color:var(--g400);margin-left:8px">PDF, Office, Images · up to 5MB</span></div>' : '') +
    '</div>',
    '<button class="btn btn-secondary" onclick="closeViInv()">Close</button>',
    'modal-xl'
  );
}
function _invoiceWorkflowBar(status) {
  var steps = ['Draft','Approved','Sent','Paid'];
  var current = steps.indexOf(status);
  if (status === 'Void' || status === 'Bad Debt' || status === 'Partial') current = -1;
  var html = '<div style="display:flex;align-items:center;gap:0;margin-bottom:16px;background:var(--g50);border-radius:var(--r8);padding:10px 14px;overflow:hidden">';
  steps.forEach(function(s, i) {
    var isActive  = i === current;
    var isDone    = i < current;
    var isVoidSt  = status==='Void'||status==='Bad Debt';
    var col = isDone ? 'var(--green-600)' : (isActive ? 'var(--blue-600)' : 'var(--g300)');
    html += '<div style="display:flex;align-items:center;flex:1;min-width:0">' +
      '<div style="display:flex;flex-direction:column;align-items:center;flex:1">' +
        '<div style="width:24px;height:24px;border-radius:50%;background:'+(isDone?'var(--green-600)':(isActive?'var(--blue-600)':'var(--g200)'))+ ';display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:'+(isDone||isActive?'#fff':'var(--g400)')+'">'+
          (isDone ? '✓' : (i+1)) +
        '</div>' +
        '<div style="font-size:10px;font-weight:'+(isActive?'700':'500')+';color:'+col+';margin-top:4px;white-space:nowrap">' +
          (s==='Draft'?'Draft (Pro-Forma)':s==='Approved'?'Approved (Tax Invoice)':s) +
        '</div>' +
      '</div>' +
      (i < steps.length-1 ? '<div style="flex:1;height:2px;background:'+(i<current?'var(--green-600)':'var(--g200)')+';margin:0 4px;min-width:20px"></div>' : '') +
    '</div>';
  });
  if (status==='Void')     html += '<div style="margin-left:8px;color:var(--g400);font-size:12px;font-weight:600">⊘ VOID</div>';

function _fileIcon(type) {
  if (!type) return '📎';
  if (type.indexOf('pdf') >= 0)   return '📄';
  if (type.indexOf('image') >= 0) return '🖼';
  if (type.indexOf('word') >= 0 || type.indexOf('document') >= 0) return '📝';
  if (type.indexOf('sheet') >= 0 || type.indexOf('excel') >= 0)   return '📊';
  return '📎';
}
async function attachToInvoice(input, invoiceId) {
  var file = input.files[0]; if (!file) return;
  if (file.size > 5242880) { toast('File too large — max 5MB', 'warning'); return; }
  var reader = new FileReader();
  reader.onload = async function(e) {
    var dataUrl  = e.target.result;
    var base64   = dataUrl.split(',')[1];
    var desc     = file.name;
    toast('Uploading '+file.name+'...', 'info', 2000);
    var r = await api('uploadInvoiceFile', {
      invoiceId:   invoiceId,
      base64Data:  base64,
      fileName:    file.name,
      fileType:    file.type,
      description: desc
    });
    if (r && r.success) {
      toast(file.name + ' attached', 'success');
      loadInvoiceAttachments(invoiceId);
    } else {
      toast('Error: '+(r?r.message||r.error:'unknown'), 'error');
    }
    input.value = '';
  };
  reader.readAsDataURL(file);
}
async function deleteAttachment(fileId, invoiceId) {

function _editInvVatSel(i, val) {
  var opts=[['20','20% Std'],['5','5% Red'],['0','0% Zero'],['exempt','Exempt']];
  var v = val!==undefined?String(val):'20';
  return '<select class="form-select" style="padding:4px 6px;font-size:12px" onchange="_editInvLines['+i+'].vatRate=parseFloat(this.value)||0;renderEditInvLines()">'+
    opts.map(function(o){ return '<option value="'+o[0]+'"'+(v===o[0]||v===String(parseFloat(o[0]))?' selected':'')+'>'+o[1]+'</option>'; }).join('')+'</select>';
}
function renderEditInvLines() {
  var tb = document.getElementById('ei-lines'); if (!tb) return;
  tb.innerHTML = _editInvLines.map(function(l,i){
    var tot=(parseFloat(l.qty)||0)*(parseFloat(l.unitPrice)||0)*(1+(parseFloat(l.vatRate)||0)/100);
    return '<tr>'+
      '<td style="padding:3px"><input class="form-input" style="padding:5px 7px;font-size:12px" value="'+(l.description||'')+'" placeholder="Description" oninput="_editInvLines['+i+'].description=this.value"></td>'+
      '<td style="padding:3px"><input class="form-input" style="padding:4px 6px;font-size:12px;text-align:right" type="number" min="0.01" step="0.01" value="'+(l.qty||1)+'" onchange="_editInvLines['+i+'].qty=parseFloat(this.value)||1;_updateEditLineTot('+i+')" oninput="if(this.value.length>0&&!isNaN(this.value))_editInvLines['+i+'].qty=parseFloat(this.value)||1"></td>'+
      '<td style="padding:3px"><input class="form-input" id="ei-price-'+i+'" style="padding:4px 6px;font-size:12px;text-align:right" type="number" min="0" step="0.01" value="'+(l.unitPrice||0)+'" onchange="_editInvLines['+i+'].unitPrice=parseFloat(this.value)||0;_updateEditLineTot('+i+')" oninput="if(this.value.length>0&&!isNaN(this.value))_editInvLines['+i+'].unitPrice=parseFloat(this.value)||0"></td>'+
      '<td style="padding:3px">'+_editInvVatSel(i,l.vatRate)+'</td>'+
      '<td style="padding:3px;text-align:right"><span class="mono" id="ei-linetot-'+i+'" style="font-size:12px">'+fmt(tot)+'</span></td>'+
      '<td style="padding:3px;text-align:center"><button onclick="removeEditInvLine('+i+')" style="background:none;border:none;color:var(--g400);cursor:pointer;font-size:15px;padding:1px 4px">×</button></td>'+
    '</tr>';
  }).join('');
  _recalcEditTotals();
}
function _updateEditLineTot(i) {
  var l = _editInvLines[i];
  var tot = (parseFloat(l.qty)||0)*(parseFloat(l.unitPrice)||0)*(1+(parseFloat(l.vatRate)||0)/100);
  var el = document.getElementById('ei-linetot-'+i);
  if (el) el.textContent = fmt(tot);
  _recalcEditTotals();
}
function _recalcEditTotals() {
  var sub=0,vat=0;
  _editInvLines.forEach(function(l){ var n=(parseFloat(l.qty)||0)*(parseFloat(l.unitPrice)||0); sub+=n; vat+=n*(parseFloat(l.vatRate)||0)/100; });
  var s=document.getElementById('ei-sub'),v=document.getElementById('ei-vat'),t=document.getElementById('ei-total');
  if(s) s.textContent=fmt(sub); if(v) v.textContent=fmt(vat); if(t) t.textContent=fmt(sub+vat);
}
function addEditInvLine()     { _editInvLines.push({description:'',qty:1,unitPrice:0,vatRate:20}); renderEditInvLines(); }
function removeEditInvLine(i) { _editInvLines.splice(i,1); if(!_editInvLines.length) _editInvLines.push({description:'',qty:1,unitPrice:0,vatRate:20}); renderEditInvLines(); }

async function saveEditInvoice(invoiceId) {
  if (invoiceId) _editInvId = invoiceId;
  invoiceId = _editInvId;
  var inv    = (App.data.invoices||[]).find(function(i){ return i.invoiceId===invoiceId; });
  var status = inv ? (inv.status||'Draft') : 'Draft';
  var isDraft= status==='Draft';
  var updates = {
    invoiceId: invoiceId,
    clientId:  isDraft ? (document.getElementById('ei-client')||{}).value : undefined,
    issueDate: isDraft ? (document.getElementById('ei-issue') ||{}).value : undefined,
    dueDate:   (document.getElementById('ei-due')   ||{}).value||undefined,
    reference: (document.getElementById('ei-ref')   ||{}).value,
    notes:     (document.getElementById('ei-notes') ||{}).value,
    lines:     isDraft ? _editInvLines.filter(function(l){ return l.description; }) : undefined
  };
  var btn = document.getElementById('ei-save');
  if (btn) { btn.disabled=true; btn.textContent='Saving...'; }
  var r = await api('editInvoice', updates);
  if (r&&r.success) {
    closeModal('inv-edit');
    toast('Invoice updated','success');
    var fresh = await api('getAllInvoices');
    if (fresh&&fresh.success) App.data.invoices = fresh.invoices||[];
    closeModal('vi-inv'); viewInvoice(invoiceId);
  } else {
    if (btn) { btn.disabled=false; btn.textContent='Save Changes'; }
    toast('Error: '+(r?r.message||r.error:'unknown'),'error');
  }
}

var _revertInvId = null, _revertTarget = null;
function revertInvoice(invoiceId, currentStatus) {
  _revertInvId = invoiceId;
  _revertTarget = currentStatus==='Sent'?'Approved':'Draft';
  var warn = _revertTarget==='Draft'?' It will become a Pro-Forma and be excluded from VAT.':'';
  openModal('inv-revert','Revert Invoice',
    '<div class="alert alert-warning"><p>Revert from <strong>'+currentStatus+'</strong> to <strong>'+_revertTarget+'</strong>?'+warn+'</p></div>',
    '<button class="btn btn-secondary" onclick="closeInvRevert()">Cancel</button>'+
    '<button class="btn btn-warning" onclick="doRevertInvoice()">Revert to '+_revertTarget+'</button>',
    'modal-sm'
  );
}
async function doRevertInvoice() {
  var invoiceId=_revertInvId, targetStatus=_revertTarget;
  closeModal('inv-revert');
  var r = await api('editInvoice', { invoiceId:invoiceId, forceStatus:targetStatus });
  if (r&&r.success) {
    toast('Reverted to '+targetStatus,'success');
    App.data.invoices = App.data.invoices.map(function(i){ return i.invoiceId===invoiceId?Object.assign({},i,{status:targetStatus}):i; });
    closeModal('vi-inv'); viewInvoice(invoiceId);
  } else toast('Error: '+(r?r.message||r.error:'unknown'),'error');
}

var _deleteInvId = null;
function confirmDeleteInvoice(invoiceId) {

async function doWriteOff() {
  var date   = (document.getElementById('wo-date')||{}).value||'';
  var reason = (document.getElementById('wo-reason')||{}).value||'';
  if (!date)         { toast('Select a write-off date','warning'); return; }
  if (!reason.trim()){ toast('Enter a reason','warning'); return; }
  var btn = document.getElementById('wo-btn');
  if (btn) { btn.disabled=true; btn.textContent='Writing off…'; }
  var r = await api('writeOffInvoice', { invoiceId:_writeOffInvoiceId, writeOffDate:date, reason:reason });
  if (r && r.success) {
    closeModal('inv-writeoff');
    closeModal('vi-inv');
    toast('Invoice written off as bad debt','success');
    App.data.invoices = App.data.invoices.map(function(i){
      return i.invoiceId===_writeOffInvoiceId ? Object.assign({},i,{status:'Bad Debt',amountDue:0}) : i;
    });
    if (r.badDebt) App.data.badDebts = (App.data.badDebts||[]).concat(r.badDebt);
    showInvoices();
  } else {
    if (btn) { btn.disabled=false; btn.textContent='Write Off as Bad Debt'; }
    toast('Error: '+(r?r.message||r.error:'unknown'),'error');
  }
}

// Called from showSettings() after render to wire up VAT toggle
function initVATToggle() {
  var cb = document.getElementById('s_vatRegistered');
  if (!cb) return;
  function toggle() {
    var show = cb.checked;
    ['vat-fields-section'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.style.display = show ? '' : 'none';
    });
  }
  cb.addEventListener('change', toggle);
  toggle(); // run on init
}

    '<button class="btn btn-secondary" onclick="closeYEClose()">Cancel</button>' +
    '<button class="btn btn-secondary" id="ye-check-btn" onclick="runYEChecks()">▶ Run Pre-Close Checks</button>' +
    '<button class="btn btn-primary" id="ye-confirm-btn" onclick="confirmYEClose()" style="display:none">🏁 Confirm Close</button>',
    'modal-lg'
  );
}

async function runYEChecks() {
  var end   = (document.getElementById('ye-end')||{}).value||'';
  var start = (document.getElementById('ye-start')||{}).value||'';
  if (!end||!start) { toast('Enter start and end dates','warning'); return; }
  var btn = document.getElementById('ye-check-btn');
  if (btn) { btn.disabled=true; btn.textContent='Checking...'; }
  var el = document.getElementById('ye-checks-area');
  if (el) el.innerHTML='<div class="loader" style="height:48px"><div class="spin"></div><span>Running checks...</span></div>';

  var checks = await api('runPreCloseChecks',{yearEndDate:end});
  var summary = await api('getYearEndSummary',{yearStart:start,yearEnd:end});
  _yeState.checks  = checks;
  _yeState.summary = summary;

  if (btn) { btn.disabled=false; btn.textContent='▶ Re-run Checks'; }

  var html = '';
  if (checks&&checks.success) {
    html += '<div style="margin-bottom:12px"><strong style="font-size:13px">Pre-Close Checklist</strong></div>';
    html += '<div style="display:flex;flex-direction:column;gap:6px">';
    (checks.checks||[]).forEach(function(c){
      var icon = c.status==='pass'?'✅':c.status==='warning'?'⚠️':'❌';
      var col  = c.status==='pass'?'var(--green-600)':c.status==='warning'?'var(--amber-500)':'var(--red-500)';
      html += '<div style="display:flex;align-items:flex-start;gap:10px;padding:8px 12px;background:var(--g50);border-radius:6px">' +
        '<span style="font-size:16px;flex-shrink:0">'+icon+'</span>' +
        '<div><div style="font-size:12px;font-weight:600;color:var(--g800)">'+c.label+'</div>' +
          '<div style="font-size:11px;color:'+col+'">'+c.detail+'</div></div>' +
      '</div>';
    });
    html += '</div>';

    if (summary&&summary.success) {
      html += '<div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--g200)">' +
        '<strong style="font-size:13px">Year-End P&L Summary</strong>' +
        '<div class="stats-grid" style="grid-template-columns:repeat(3,1fr);margin-top:8px">' +
          '<div class="stat-card" style="padding:10px"><div class="stat-label">Total Revenue</div><div style="font-weight:700;color:var(--green-600)">'+fmt(summary.revenue)+'</div></div>' +
          '<div class="stat-card" style="padding:10px"><div class="stat-label">Total Expenses</div><div style="font-weight:700;color:var(--red-500)">'+fmt(summary.expenses)+'</div></div>' +
          '<div class="stat-card" style="padding:10px;border-left:3px solid '+(summary.netProfit>=0?'var(--green-600)':'var(--red-500)')+'"><div class="stat-label">Net Profit</div>' +
            '<div style="font-weight:700;font-size:18px;color:'+(summary.netProfit>=0?'var(--green-600)':'var(--red-500)')+'">'+fmt(summary.netProfit)+'</div></div>' +
        '</div>' +
      '</div>';
    }
  } else {
    html = '<div class="alert alert-error"><p>'+(checks?checks.message:'Error running checks')+'</p></div>';
  }
  if (el) el.innerHTML = html;

  var confirmBtn = document.getElementById('ye-confirm-btn');
  if (confirmBtn) {
    confirmBtn.style.display = (checks&&checks.canClose) ? 'inline-flex' : 'none';
  }
  if (!checks||!checks.canClose) {
    toast(checks&&checks.errors ? checks.errors+' error(s) must be resolved before closing' : 'Checks failed','error',4000);
  } else if (checks.warnings>0) {
    toast(checks.warnings+' warning(s) — review before confirming close','warning',4000);
  } else {
    toast('All checks passed — ready to close','success',3000);
  }
}

async function confirmYEClose() {
  var start  = (document.getElementById('ye-start')||{}).value||'';
  var end    = (document.getElementById('ye-end')||{}).value||'';
  var label  = (document.getElementById('ye-label')||{}).value||'';
  var reCode = (document.getElementById('ye-re-code')||{}).value||'3000';
  var notes  = (document.getElementById('ye-notes')||{}).value||'';
  if (!start||!end) { toast('Dates are required','warning'); return; }
  var btn = document.getElementById('ye-confirm-btn');
  if (btn) { btn.disabled=true; btn.textContent='Closing year...'; }
  var r = await api('closeFinancialYear',{yearStart:start,yearEnd:end,label:label,retainedEarningsCode:reCode,notes:notes});
  if (r&&r.success) {
    closeYEClose();
    // Update local settings
    App.settings.lockedBefore    = r.lockedBefore;
    App.settings.financialYearStart = r.newYearStart||start;
    toast('Financial year '+r.label+' closed · Net profit: '+fmt(r.netProfit),'success',6000);
    showYearEnd();
  } else {
    if (btn) { btn.disabled=false; btn.textContent='🏁 Confirm Close'; }
    toast('Error: '+(r?r.message||r.error:'unknown'),'error');
  }
}

function openYEReopenModal(yearId) {

async function doYEReopen(btn) {
  var yearId = btn.getAttribute('data-yid');
  var reason = (document.getElementById('ye-reopen-reason')||{}).value||'';
  if (!reason.trim()) { toast('Enter a reason','warning'); return; }
  btn.disabled=true; btn.textContent='Reopening...';
  var r = await api('reopenFinancialYear',{yearId:yearId,reason:reason});
  if (r&&r.success) {
    closeYEReopen();
    toast('Year reopened — period lock removed','success');

    showYearEnd();
  } else {
    btn.disabled=false; btn.textContent='Reopen Year';

async function showFixedAssets(params) {

  _faState.assets = r.assets||[];
  _renderFA();

function _renderFA() {
  var all    = _faState.assets;
  var filter = _faState.filter||'all';
  var list   = filter==='all' ? all : all.filter(function(a){ return a.status===filter; });
  var cw     = canWrite();

  var totalCost  = all.filter(function(a){return a.status==='Active';}).reduce(function(s,a){return s+a.purchaseCost;},0);
  var totalAccum = all.filter(function(a){return a.status==='Active';}).reduce(function(s,a){return s+a.accumulatedDepreciation;},0);
  var totalNBV   = all.filter(function(a){return a.status==='Active';}).reduce(function(s,a){return s+a.netBookValue;},0);

  var pills = ['all','Active','Disposed'].map(function(f){
    var cnt = f==='all' ? all.length : all.filter(function(a){return a.status===f;}).length;
    return '<button class="pill'+(_faState.filter===f?' active':'')+'" onclick="_faFilter(\''+f+'\')">'+f+' ('+cnt+')</button>';
  }).join('');

  showContent(
    '<div class="page-hdr"><div><div class="page-title">Fixed Assets</div>' +
      '<div class="page-sub">'+all.filter(function(a){return a.status==='Active';}).length+' active assets · NBV '+fmt(totalNBV)+'</div></div>' +
      '<div class="page-actions">' +
        (cw?'<button class="btn btn-secondary btn-sm" onclick="openFADepRunModal()">📅 Run Depreciation</button> ':'') +
        (cw?'<button class="btn btn-primary" onclick="openFACreateModal()">+ Add Asset</button>':'') +
      '</div></div>' +

    // Summary KPIs
    '<div class="stats-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:16px">' +
      '<div class="stat-card"><div class="stat-label">Total Cost</div><div class="stat-value">'+fmt(totalCost)+'</div></div>' +
      '<div class="stat-card"><div class="stat-label">Accumulated Depreciation</div><div class="stat-value" style="color:var(--red-500)">'+fmt(totalAccum)+'</div></div>' +
      '<div class="stat-card" style="border-left:3px solid var(--blue-600)"><div class="stat-label">Net Book Value</div><div class="stat-value" style="color:var(--blue-600)">'+fmt(totalNBV)+'</div></div>' +
      '<div class="stat-card"><div class="stat-label">Active Assets</div><div class="stat-value">'+all.filter(function(a){return a.status==='Active';}).length+'</div></div>' +
    '</div>' +

    '<div class="filter-bar">'+pills+'</div>' +

    '<div class="tbl-wrap">' +
    (!list.length ?
      '<div class="empty"><h3>No '+filter+' assets</h3>' +
        (cw&&filter==='all'?'<button class="btn btn-primary" onclick="openFACreateModal()">Add First Asset</button>':'')+
      '</div>' :
      '<table class="dt"><thead><tr>' +
        '<th>Asset</th><th>Category</th><th>Purchase Date</th><th>Cost</th>' +
        '<th>Accum. Depn</th><th>Net Book Value</th><th>Method</th><th>Status</th><th></th>' +
      '</tr></thead><tbody>' +
      list.map(function(a){
        var nbvPct = a.purchaseCost>0 ? Math.round(100*a.netBookValue/a.purchaseCost) : 0;
        return '<tr onclick="openFAViewModal(\''+a.assetId+'\')" style="cursor:pointer">' +
          '<td><strong>'+a.assetName+'</strong><div style="font-size:10px;color:var(--g400)">'+a.category+'</div></td>' +
          '<td style="font-size:12px">'+a.category+'</td>' +
          '<td>'+fmtDate(a.purchaseDate)+'</td>' +
          '<td>'+fmt(a.purchaseCost)+'</td>' +
          '<td style="color:var(--g500)">'+fmt(a.accumulatedDepreciation)+'</td>' +
          '<td>' +
            '<div style="font-weight:700">'+fmt(a.netBookValue)+'</div>' +
            '<div style="height:3px;background:var(--g100);border-radius:2px;margin-top:3px;width:80px">' +
              '<div style="height:3px;background:var(--blue-500);border-radius:2px;width:'+nbvPct+'%"></div>' +
            '</div>' +
          '</td>' +
          '<td style="font-size:11px;color:var(--g500)">'+a.depreciationRate+'% '+(a.depreciationMethod==='straight'?'SL':'RB')+'</td>' +
          '<td>'+badge(a.status)+'</td>' +
          '<td onclick="event.stopPropagation()" style="white-space:nowrap">' +
            (a.status==='Active'&&cw?'<button class="btn btn-ghost btn-xs" onclick="event.stopPropagation();openFAScheduleModal(\''+a.assetId+'\')">Schedule</button> ':'') +
            (a.status==='Active'&&cw?'<button class="btn btn-ghost btn-xs" onclick="event.stopPropagation();openFADisposeModal(\''+a.assetId+'\')">Dispose</button>':'') +
          '</td>' +
        '</tr>';
      }).join('')+
      '</tbody></table>' +
      '<div class="tbl-foot"><span>'+list.length+' assets</span><span>NBV: '+fmt(totalNBV)+'</span></div>'
    )+'</div>'
  );
}

    depreciationMethod: (document.getElementById('fae-method')||{}).value,

    usefulLifeYears:    parseFloat((document.getElementById('fae-life')||{}).value)||0,

  };
  var btn = document.getElementById('fae-save');

  else { if (btn){btn.disabled=false;btn.textContent='Save Changes';} toast('Error: '+(r?r.message||r.error:'unknown'),'error'); }
}

  );

async function previewDepRun() {
  var end    = (document.getElementById('fadr-end')||{}).value||'';
  var months = parseInt((document.getElementById('fadr-months')||{}).value)||1;
  var el     = document.getElementById('fadr-preview');
  if (el) el.innerHTML='<div class="loader" style="height:40px"><div class="spin"></div></div>';
  // Calculate locally using _faState.assets
  var rows = _faState.assets.filter(function(a){return a.status==='Active';}).map(function(a){
    var depreciableAmt = a.purchaseCost - a.residualValue;
    var charge=0;
    if (a.depreciationMethod==='straight') {
      charge = depreciableAmt/(a.usefulLifeYears||5) * months/12;
    } else {
      charge = a.netBookValue * (a.depreciationRate/100) * months/12;
    }
    charge = Math.min(charge, Math.max(0, a.netBookValue - a.residualValue));
    return { name:a.assetName, nbv:a.netBookValue, charge:charge, newNBV:a.netBookValue-charge };
  });
  var total = rows.reduce(function(s,r){return s+r.charge;},0);
  if (el) el.innerHTML = rows.length
    ? '<div style="font-size:12px;font-weight:600;color:var(--g700);margin-bottom:6px">Preview ('+months+' month'+(months>1?'s':'')+')</div>' +
      '<table class="dt"><thead><tr><th>Asset</th><th>Current NBV</th><th>Charge</th><th>New NBV</th></tr></thead><tbody>' +
      rows.map(function(r){return '<tr><td>'+r.name+'</td><td>'+fmt(r.nbv)+'</td><td style="color:var(--red-500)">'+fmt(r.charge)+'</td><td style="font-weight:600">'+fmt(r.newNBV)+'</td></tr>';}).join('') +
      '<tr style="font-weight:700;border-top:2px solid var(--g200)"><td colspan="2">Total</td><td style="color:var(--red-500)">'+fmt(total)+'</td><td></td></tr>' +
      '</tbody></table>'
    : '<div style="padding:12px;color:var(--g400);font-size:12px">No active assets to depreciate</div>';
}

async function runDepRun(postToLedger) {
  var end    = (document.getElementById('fadr-end')||{}).value||'';
  var months = parseInt((document.getElementById('fadr-months')||{}).value)||1;
  if (!end) { toast('Select a period end date','warning'); return; }
  var btnId = postToLedger?'fadr-post-btn':'fadr-btn';
  var btn   = document.getElementById(btnId);
  if (btn) { btn.disabled=true; btn.textContent='Running...'; }
  var r = await api('runDepreciationRun',{periodEndDate:end,periodMonths:months,postToLedger:postToLedger});
  if (r&&r.success) {
    closeFADepRun();
    toast(r.message+(postToLedger?' (posted to ledger)':''),'success',5000);
    showFixedAssets();
  } else {
    if (btn) { btn.disabled=false; btn.textContent=postToLedger?'Run & Post':'Run (No Posting)'; }
    toast('Error: '+(r?r.message||r.error:'unknown'),'error');
  }
}

async function runMaint(action, btn) {
  var outId = 'maint-'+action.replace(/([A-Z])/g,function(m){ return '-'+m.toLowerCase(); }).replace('maint-','').replace(/^-/,'')+'-out';
  var actionMap = {
    diagnoseSheets: 'maint-diagnose-out',
    rebuildAccountBalances: 'maint-rebuild-out',
    cleanDuplicateTxns: 'maint-clean-out',
    createBackup: 'maint-backup-out',
    initializeSystem: 'maint-init-out',
    verifyIntegrity: 'maint-verify-out'
  };
  var elId = actionMap[action] || outId;
  var el = document.getElementById(elId);
  if (btn) { btn.disabled=true; btn.textContent='Running...'; }
  if (el) el.innerHTML = '<div class="loader" style="height:40px"><div class="spin"></div></div>';
  var r = await api(action, {});
  if (btn) { btn.disabled=false; btn.textContent=btn.textContent.replace('Running...', btn.getAttribute('data-label')||'Run'); }
  if (el) {
    if (r && r.success !== false) {
      var summary = r.message || JSON.stringify(r, null, 2);
      // For diagnoseSheets, show a nice summary
      if (action==='diagnoseSheets' && r.known) {
        summary = '✅ '+r.known.length+' known sheets · '+(r.unknown&&r.unknown.length?'⚠ '+r.unknown.length+' unknown':'no unknown sheets');
      }
      el.innerHTML = '<div class="alert alert-success" style="padding:8px 12px;font-size:12px"><p>'+summary+'</p></div>';
    } else {
      el.innerHTML = '<div class="alert alert-error" style="padding:8px 12px;font-size:12px"><p>'+(r?r.message||r.error:'Unknown error')+'</p></div>';
    }
  }
}

var _auditEntries = [];
async function loadAuditLog() {
  var el = document.getElementById('audit-log-body'); if (!el) return;
  var r = await api('getAuditLog', { limit:200 });
  if (!r || !r.success) {
    el.innerHTML = '<div class="tbl-empty"><p>Could not load audit log: '+(r?r.message:'unknown')+'</p></div>';
    return;
  }
  _auditEntries = r.entries || [];
  renderAuditTable(_auditEntries);
  // Show total count
  var hdr = document.querySelector('#audit-log-body')?.previousElementSibling?.querySelector('.card-ttl');
  if (hdr) hdr.textContent = '📋 Audit Log (' + r.total + ' total, showing ' + _auditEntries.length + ')';
}

function filterAuditLog(searchVal) {
  var search = typeof searchVal === 'string' ? searchVal : (document.getElementById('audit-search')||{}).value||'';
  var action = (document.getElementById('audit-action')||{}).value||'';
  var filtered = _auditEntries.filter(function(e) {
    var matchSearch = !search || (e.user+e.action+e.entityType+e.entityId+e.detail).toLowerCase().indexOf(search.toLowerCase()) >= 0;
    var matchAction = !action || e.action.indexOf(action) >= 0;
    return matchSearch && matchAction;
  });
  renderAuditTable(filtered);
}

function renderAuditTable(entries) {
  var el = document.getElementById('audit-log-body'); if (!el) return;
  if (!entries.length) {
    el.innerHTML = '<div class="tbl-empty"><p>No entries match the filter</p></div>';
    return;
  }
  // Action badge colours
  var actionColour = function(a) {
    if (a.indexOf('CREATE')>=0||a.indexOf('ADD')>=0) return 'badge-green';
    if (a.indexOf('DELETE')>=0||a.indexOf('VOID')>=0||a.indexOf('REMOVE')>=0) return 'badge-red';
    if (a.indexOf('UPDATE')>=0||a.indexOf('EDIT')>=0||a.indexOf('SAVE')>=0) return 'badge-blue';
    if (a.indexOf('SUBMIT')>=0||a.indexOf('APPROVE')>=0) return 'badge-purple';
    if (a.indexOf('LOGIN')>=0) return 'badge-grey';
    return 'badge-grey';
  };
  el.innerHTML = '<table class="dt"><thead><tr>' +
    '<th>Time</th><th>User</th><th>Action</th><th>Entity</th><th>ID</th><th>Detail</th>' +
    '</tr></thead><tbody>' +
    entries.slice(0,200).map(function(e) {
      return '<tr>' +
        '<td style="white-space:nowrap;font-size:11px">'+fmtDate(e.timestamp)+'</td>' +
        '<td style="font-size:12px">'+e.user+'</td>' +
        '<td><span class="badge '+actionColour(e.action)+'" style="font-size:10px">'+e.action+'</span></td>' +
        '<td style="font-size:12px">'+e.entityType+'</td>' +
        '<td class="mono" style="font-size:11px;max-width:100px;overflow:hidden;text-overflow:ellipsis">'+e.entityId+'</td>' +
        '<td style="font-size:11px;color:var(--g600);max-width:200px;overflow:hidden;text-overflow:ellipsis" title="'+e.detail+'">'+e.detail+'</td>' +
      '</tr>';
    }).join('') +
    '</tbody></table>';
}
