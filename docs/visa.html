<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>no~bull visa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://accounts.google.com">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root {
      /* Dark palette — premium B2B sign-in feel */
      --bg:           #0c1118;
      --surface:      #151c27;
      --surface-2:    #1e2a3a;
      --border:       #2a3a50;
      --border-hover: #3b82f6;
      --text:         #f1f5f9;
      --text-muted:   #8a9bb0;
      --primary:      #3b82f6;
      --primary-2:    #60a5fa;
      --accent:       #14b8a6;
      --success:      #22c55e;
      --warning:      #f59e0b;
      --danger:       #ef4444;
      /* Brand colours matching nobull.consulting */
      --oxford-blue:  #002147;
      --brand-mono:   'Courier Prime', 'Courier New', Courier, monospace;
    }

    * { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0; padding: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1.5rem;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.45), 0 4px 12px rgba(0,0,0,0.3);
    }

    /* ── Brand wordmark ── */
    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 2rem;
    }

    .brand-logo {
      /* The bull-on-wheels mark — white version via CSS filter */
      width: 56px;
      height: auto;
      filter: brightness(0) invert(1) opacity(0.85);
      display: block;
    }

    .brand-wordmark {
      font-family: var(--brand-mono);
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--text);
      line-height: 1;
    }

    .brand-wordmark .tilde  { color: var(--accent); }
    .brand-wordmark .product { color: var(--accent); }

    .brand-tagline {
      font-size: 0.7rem;
      color: var(--text-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 500;
    }

    /* ── Headings ── */
    h2 {
      text-align: center;
      font-size: 1.25rem;
      font-weight: 600;
      margin: 0 0 0.4rem;
      color: var(--text);
    }

    .subtitle {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.875rem;
      margin: 0 0 1.5rem;
      line-height: 1.5;
    }

    /* ── Google sign-in button wrapper ── */
    .signin-box {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.6rem;
      display: flex;
      justify-content: center;
      margin-top: 1rem;
    }

    /* ── Workspace list ── */
    .workspaces {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      max-height: 380px;
      overflow-y: auto;
      margin-bottom: 1rem;
      /* Subtle scrollbar */
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .workspace {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.25rem;
      cursor: pointer;
      transition: transform .15s ease, border-color .15s ease, background .15s ease;
      position: relative;
    }

    .workspace:hover {
      transform: translateY(-1px);
      border-color: var(--border-hover);
      background: #1e2e45;
    }

    .workspace:focus-visible {
      outline: 3px solid var(--primary);
      outline-offset: 2px;
    }

    .workspace.add-new {
      background: transparent;
      border-style: dashed;
      border-color: var(--border);
      text-align: center;
    }

    .workspace.add-new:hover {
      border-color: var(--primary-2);
      background: rgba(59, 130, 246, 0.06);
    }

    .ws-name {
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 0.2rem;
      color: var(--text);
    }

    .ws-status {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
    }

    .ws-status.Active        { color: var(--success); }
    .ws-status.Trial         { color: var(--warning); }
    .ws-status.TrialExpired  { color: var(--warning); }
    .ws-status.Suspended     { color: var(--danger); }

    .role-badge {
      display: inline-block;
      background: rgba(20, 184, 166, 0.18);
      color: var(--accent);
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      font-size: 0.65rem;
      font-weight: 700;
      margin-left: 0.4rem;
      vertical-align: middle;
      letter-spacing: 0.04em;
    }

    .role-badge.Superuser { background: rgba(168, 85, 247, 0.18); color: #c084fc; }
    .role-badge.Owner     { background: rgba(59, 130, 246, 0.18); color: var(--primary-2); }

    .add-new .ws-name   { color: var(--primary-2); font-weight: 500; }
    .add-new .ws-status { color: var(--text-muted); font-weight: 400; }

    /* ── Sign-out footer ── */
    .signout {
      text-align: center;
      margin-top: 1.25rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
    }

    .signout a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.8rem;
      cursor: pointer;
      transition: color .15s;
    }

    .signout a:hover { color: var(--danger); }

    /* ── Error & utility ── */
    .error {
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.35);
      color: #fca5a5;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-top: 1rem;
      line-height: 1.5;
    }

    .empty {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--text-muted);
      font-size: 0.875rem;
      line-height: 1.7;
    }

    .spinner {
      display: inline-block;
      width: 20px; height: 20px;
      border: 2px solid var(--surface-2);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .center { text-align: center; padding: 1rem; color: var(--text-muted); font-size: 0.875rem; }

    /* ── Footer credit ── */
    .page-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.7rem;
      color: var(--text-muted);
      opacity: 0.6;
    }

    .page-footer a {
      color: inherit;
      text-decoration: none;
    }

    .page-footer a:hover { opacity: 1; text-decoration: underline; }
  </style>
</head>

  <div class="workspaces" id="workspaces-list" role="list" aria-label="Your workspaces">
    <div class="center"><div class="spinner" aria-hidden="true"></div><br>Loading your workspaces&hellip;</div>

      Sign out

<script>
  var HUB_URL = 'https://script.google.com/macros/s/AKfycbwwTJMpfpiSj-la03OfVHrHGibm9n8yEagyA0ti4cDRU9sMizCOHvd0eiBfSGKyGKPU/exec';

  var currentCredential = null;
  var currentEmail = null;

  // JSONP helper — unique callback per request
  function callHubViaJsonp(action, params, callback) {
    var cbName = '__hub_' + Math.random().toString(36).slice(2, 10);
    var script = document.createElement('script');
    var timeoutId;
    window[cbName] = function(data) {
      clearTimeout(timeoutId);
      try { delete window[cbName]; } catch(_) {}
      if (script.parentNode) script.parentNode.removeChild(script);
      callback(null, data);
    };
    var qs = 'action=' + encodeURIComponent(action) +
             '&callback=' + cbName +
             '&credential=' + encodeURIComponent(currentCredential || '');
    Object.keys(params || {}).forEach(function(k) {
      qs += '&' + encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);
    });
    script.src = HUB_URL + (HUB_URL.indexOf('?') >= 0 ? '&' : '?') + qs;
    script.onerror = function() {
      clearTimeout(timeoutId);
      if (script.parentNode) script.parentNode.removeChild(script);
      try { delete window[cbName]; } catch(_) {}
      callback(new Error('Could not reach the platform. Check your connection.'));
    };
    timeoutId = setTimeout(function() {
      if (script.parentNode) script.parentNode.removeChild(script);
      try { delete window[cbName]; } catch(_) {}
      callback(new Error('Timed out waiting for the platform.'));
    }, 15000);
    document.head.appendChild(script);
  }

  function handleSignIn(response) {
    if (!response || !response.credential) {
      showError('Sign-in failed: no credential received.');
      return;
    }
    currentCredential = response.credential;
    try {
      var payloadB64 = response.credential.split('.')[1];
      var payload = JSON.parse(atob(payloadB64.replace(/-/g, '+').replace(/_/g, '/')));
      currentEmail = payload.email;
    } catch(e) {
      currentEmail = '(signed in)';
    }
    showWorkspaces();
  }

  function showWorkspaces() {
    document.getElementById('signin-card').style.display = 'none';
    var wCard = document.getElementById('workspaces-card');
    wCard.style.display = 'block';
    // Show who is signed in
    var label = document.getElementById('signed-in-label');
    if (label && currentEmail) {
      label.textContent = 'Signed in as ' + currentEmail;
    }
    var list = document.getElementById('workspaces-list');
    list.innerHTML = '<div class="center"><div class="spinner" aria-hidden="true"></div><br>Loading&hellip;</div>';

    callHubViaJsonp('getInstances', {}, function(err, data) {
      if (err) {
        list.innerHTML = '<div class="error" role="alert">' + escapeHtml(err.message) + '</div>';
        return;
      }
      if (!data.success) {
        list.innerHTML = '<div class="error" role="alert">' + escapeHtml(data.error || 'Unknown error') + '</div>';
        return;
      }
      renderWorkspaces(data.instances || []);
    });
  }

  function renderWorkspaces(instances) {
    var list = document.getElementById('workspaces-list');
    list.innerHTML = '';

    if (!instances.length) {
      var empty = document.createElement('div');
      empty.className = 'empty';
      empty.innerHTML = "You don't have a workspace yet.<br>Click below to start your free trial.";
      list.appendChild(empty);
    } else {
      instances.forEach(function(ws) {
        var div = document.createElement('div');
        div.className = 'workspace';
        div.setAttribute('role', 'listitem');
        div.setAttribute('tabindex', '0');
        div.setAttribute('aria-label', 'Open ' + escapeHtml(ws.firmName));
        var roleBadge = ws.role && ws.role !== 'Staff'
          ? '<span class="role-badge ' + escapeHtml(ws.role) + '">' + escapeHtml(ws.role) + '</span>'
          : '';
        div.innerHTML =
          '<div class="ws-name">' + escapeHtml(ws.firmName) + roleBadge + '</div>' +
          '<div class="ws-status ' + escapeHtml(ws.computedStatus || ws.status) + '">' +
            escapeHtml(ws.computedStatus || ws.status || 'Active') +
            (ws.label ? ' — ' + escapeHtml(ws.label) : '') +
          '</div>';
        div.onclick = function() { openWorkspace(ws); };
        div.onkeydown = function(e) { if (e.key === 'Enter' || e.key === ' ') openWorkspace(ws); };
        list.appendChild(div);
      });
    }

    // "Start a new trial" card
    var addNew = document.createElement('div');
    addNew.className = 'workspace add-new';
    addNew.setAttribute('role', 'listitem');
    addNew.setAttribute('tabindex', '0');
    addNew.setAttribute('aria-label', instances.length ? 'Add another workspace' : 'Start your free trial');
    addNew.innerHTML =
      '<div class="ws-name">' + (instances.length ? '+ Add another workspace' : '+ Start your free trial') + '</div>' +
      '<div class="ws-status">' + (instances.length ? 'Start a new 30-day trial' : '30-day free trial — no credit card') + '</div>';
    addNew.onclick = function() { startNewTrial(); };
    addNew.onkeydown = function(e) { if (e.key === 'Enter' || e.key === ' ') startNewTrial(); };
    list.appendChild(addNew);
  }

  function openWorkspace(ws) {
    var list = document.getElementById('workspaces-list');
    list.innerHTML = '<div class="center"><div class="spinner" aria-hidden="true"></div><br>Opening ' + escapeHtml(ws.firmName) + '&hellip;</div>';

    callHubViaJsonp('createLaunchToken', { sheetId: ws.sheetId }, function(err, data) {
      if (err) { showWorkspaces(); showError(err.message); return; }
      if (!data.success) { showWorkspaces(); showError(data.error || 'Could not open workspace.'); return; }
      var sep = ws.appUrl.indexOf('?') >= 0 ? '&' : '?';
      window.location.href = ws.appUrl + sep + 'launch=' + encodeURIComponent(data.token);
    });
  }

  function startNewTrial() {
    window.location.href = HUB_URL +
      (HUB_URL.indexOf('?') >= 0 ? '&' : '?') +
      'action=onboard&credential=' + encodeURIComponent(currentCredential || '');
  }

  function signOut() {
    currentCredential = null;
    currentEmail = null;
    var label = document.getElementById('signed-in-label');
    if (label) label.textContent = '';
    document.getElementById('workspaces-card').style.display = 'none';
    document.getElementById('signin-card').style.display = 'block';
    document.getElementById('signin-error').style.display = 'none';
    if (window.google && window.google.accounts && window.google.accounts.id) {
      window.google.accounts.id.disableAutoSelect();
    }
  }

  function showError(msg) {
    var el = document.getElementById('signin-error');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }
</script>
</body>
</html>
